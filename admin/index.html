<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin · Instituto Lumethos</title>
  <link rel="icon" href="/img/favicon.ico">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --navy:#0D1B2A; --navy-light:#152238; --navy-card:#1a2d45;
      --gold:#C79A2E; --gold-light:#e0b84c; --white:#fff;
      --text-secondary:rgba(255,255,255,0.7); --text-muted:rgba(255,255,255,0.45);
      --border:rgba(255,255,255,0.06); --radius:10px;
      --sidebar-w:240px;
    }

    body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; }

    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:200; height:48px;
      background:rgba(13,27,42,0.94); backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px); border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; padding:0 16px;
    }
    .topbar .logo {
      font-family:'Libre Baskerville',serif; font-size:14px; color:var(--gold);
      text-decoration:none;
    }
    .topbar .user-area { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--text-secondary); }
    .topbar .logout-btn {
      background:none; border:1px solid rgba(255,255,255,.12); color:var(--text-muted);
      padding:4px 10px; border-radius:6px; font-size:11px; cursor:pointer; font-family:'Inter',sans-serif;
    }
    .topbar .logout-btn:hover { color:var(--white); border-color:rgba(255,255,255,.25); }

    .layout { display:flex; padding-top:48px; min-height:calc(100vh - 48px); }

    .sidebar {
      width:var(--sidebar-w); min-width:var(--sidebar-w);
      background:var(--navy-light); border-right:1px solid var(--border);
      position:sticky; top:48px; height:calc(100vh - 48px); overflow-y:auto;
      padding:12px 0;
    }
    .sidebar .nav-section { padding:4px 12px; margin-bottom:8px; }
    .sidebar .nav-label {
      font-size:9px; text-transform:uppercase; letter-spacing:1px;
      color:var(--text-muted); padding:0 10px; margin-bottom:6px;
    }
    .sidebar .nav-link {
      display:flex; align-items:center; gap:10px; padding:9px 10px;
      border-radius:7px; color:var(--text-secondary); text-decoration:none;
      font-size:13px; transition:all .15s;
    }
    .sidebar .nav-link:hover { background:rgba(255,255,255,.04); color:var(--white); }
    .sidebar .nav-link.active { background:rgba(199,154,46,.1); color:var(--gold); font-weight:600; }
    .sidebar .nav-link .icon { font-size:16px; width:20px; text-align:center; }

    .main-content { flex:1; padding:28px; overflow-y:auto; }

    .page-title {
      font-family:'Libre Baskerville',serif; font-size:24px; margin-bottom:6px;
    }
    .page-subtitle { color:var(--text-muted); font-size:13px; margin-bottom:28px; }

    .stats-grid {
      display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; margin-bottom:32px;
    }
    .stat-card {
      background:var(--navy-card); border-radius:var(--radius); padding:18px;
      border:1px solid var(--border);
    }
    .stat-card .stat-icon { font-size:22px; margin-bottom:6px; }
    .stat-card .stat-num { font-size:26px; font-weight:700; }
    .stat-card .stat-num.gold { color:var(--gold); }
    .stat-card .stat-label { font-size:11px; color:var(--text-muted); margin-top:4px; }

    .panel {
      background:var(--navy-card); border-radius:var(--radius);
      border:1px solid var(--border); margin-bottom:24px; overflow:hidden;
    }
    .panel-header {
      padding:14px 18px; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .panel-header h3 { font-size:14px; font-weight:600; }
    .panel-header .panel-action {
      font-size:11px; color:var(--gold); cursor:pointer; background:none; border:none;
      font-family:'Inter',sans-serif; font-weight:500;
    }
    .panel-body { padding:16px 18px; }

    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 8px; border-bottom:1px solid var(--border); color:var(--text-muted); font-weight:500; font-size:11px; text-transform:uppercase; letter-spacing:.5px; }
    td { padding:10px 8px; border-bottom:1px solid var(--border); }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:rgba(255,255,255,.01); }

    .badge {
      font-size:10px; font-weight:600; padding:2px 8px; border-radius:12px;
    }
    .badge-green { background:rgba(34,197,94,.15); color:#4ade80; }
    .badge-yellow { background:rgba(199,154,46,.15); color:var(--gold); }
    .badge-red { background:rgba(239,68,68,.12); color:#f87171; }
    .badge-blue { background:rgba(96,165,250,.12); color:#93c5fd; }

    .action-btn {
      font-size:11px; padding:4px 10px; border-radius:5px;
      border:1px solid var(--border); background:none; color:var(--text-secondary);
      cursor:pointer; font-family:'Inter',sans-serif; transition:all .15s;
    }
    .action-btn:hover { border-color:var(--gold); color:var(--gold); }
    .action-btn.danger:hover { border-color:#f87171; color:#f87171; }

    .loading-text { text-align:center; padding:40px; color:var(--text-muted); }

    @media(max-width:768px) {
      .layout { flex-direction:column; }
      .sidebar { width:100%; min-width:100%; height:auto; position:relative; top:auto; border-right:none; border-bottom:1px solid var(--border); }
      .sidebar .nav-section { display:flex; gap:4px; overflow-x:auto; padding:4px 8px; }
      .sidebar .nav-label { display:none; }
      .main-content { padding:16px; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <a href="/admin/index.html" class="logo">LUMETHOS ADMIN</a>
  <div class="user-area">
    <span id="adminName">Admin</span>
    <button class="logout-btn" onclick="logout()">Sair</button>
  </div>
</nav>

<div class="layout">
  <aside class="sidebar">
    <div class="nav-section">
      <div class="nav-label">Principal</div>
      <a href="/admin/index.html" class="nav-link active"><span class="icon">📊</span> Dashboard</a>
      <a href="#" class="nav-link" onclick="showSection('courses')"><span class="icon">📚</span> Cursos</a>
      <a href="#" class="nav-link" onclick="showSection('students')"><span class="icon">👥</span> Alunos</a>
      <a href="#" class="nav-link" onclick="showSection('mirc')"><span class="icon">🔍</span> MIRC</a>
    </div>
    <div class="nav-section">
      <div class="nav-label">Links</div>
      <a href="/biblioteca.html" class="nav-link" target="_blank"><span class="icon">📖</span> Biblioteca</a>
      <a href="/" class="nav-link" target="_blank"><span class="icon">🏠</span> Site</a>
    </div>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="loading-text">Carregando...</div>
  </main>
</div>

<script>
  const API = '/api';
  function getToken(){ return localStorage.getItem('lumethos_token'); }
  function getUser(){ return JSON.parse(localStorage.getItem('lumethos_user')||'null'); }
  function h(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }

  let adminUser = null;
  let currentSection = 'dashboard';

  async function init() {
    const res = await fetch(API+'/auth/me', { headers: h() });
    if (!res.ok) {
      window.location.href = '/login.html?redirect=/admin/index.html';
      return;
    }
    const data = await res.json();
    adminUser = data.user || data;

    // Check if admin (role comes from auth/me response)
    const isAdmin = data.role === 'admin' || adminUser.email === 'anderson.boscariol@gmail.com';
    if (!isAdmin) {
      document.getElementById('mainContent').innerHTML = `
        <div class="page-title">Acesso Negado</div>
        <p style="color:var(--text-muted);margin-bottom:16px;">Você não tem permissão de administrador.</p>
        <a href="/aluno/dashboard.html" style="color:var(--gold)">Ir para área do aluno</a>`;
      return;
    }

    document.getElementById('adminName').textContent = data.name || adminUser.email;
    showSection('dashboard');
  }

  function logout() {
    localStorage.clear();
    window.location.href = '/login.html';
  }

  async function showSection(section) {
    currentSection = section;
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => {
      if (l.getAttribute('onclick')?.includes(section)) l.classList.add('active');
    });

    const mc = document.getElementById('mainContent');

    if (section === 'dashboard') {
      await renderDashboard(mc);
    } else if (section === 'courses') {
      await renderCourses(mc);
    } else if (section === 'students') {
      await renderStudents(mc);
    } else if (section === 'mirc') {
      await renderMIRC(mc);
    }
  }

  async function renderDashboard(mc) {
    const dashRes = await fetch(API+'/admin/dashboard', { headers: h() });
    const dash = await dashRes.json();

    mc.innerHTML = `
      <div class="page-title">Dashboard Admin</div>
      <div class="page-subtitle">Visão geral do Instituto Lumethos</div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">📚</div>
          <div class="stat-num gold">${dash.courseCount || 0}</div>
          <div class="stat-label">Cursos ativos</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">👥</div>
          <div class="stat-num">${dash.studentCount || 0}</div>
          <div class="stat-label">Alunos cadastrados</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">📖</div>
          <div class="stat-num">${dash.lessonCount || 0}</div>
          <div class="stat-label">Aulas</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🔍</div>
          <div class="stat-num">${dash.mircCount || 0}</div>
          <div class="stat-label">Registros MIRC</div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <h3>🔗 Links Rápidos</h3>
        </div>
        <div class="panel-body" style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="action-btn" onclick="showSection('courses')">📚 Gerenciar Cursos</button>
          <button class="action-btn" onclick="showSection('students')">👥 Ver Alunos</button>
          <button class="action-btn" onclick="showSection('mirc')">🔍 MIRC</button>
          <a href="/biblioteca.html" class="action-btn" target="_blank">📖 Biblioteca (site)</a>
          <a href="/aluno/dashboard.html" class="action-btn" target="_blank">🎓 Área do Aluno</a>
        </div>
      </div>`;
  }

  async function renderCourses(mc) {
    const coursesRes = await fetch(API+'/admin/courses', { headers: h() });
    const courses = await coursesRes.json();

    const rows = (courses || []).map(c => `
      <tr>
        <td><strong>${c.title}</strong></td>
        <td>${c.hours || 0}h</td>
        <td>${c.active ? '<span class="badge badge-green">Ativo</span>' : '<span class="badge badge-red">Inativo</span>'}</td>
        <td>${c.price_cents ? `R$ ${(c.price_cents/100).toFixed(2)}` : 'Grátis'}</td>
        <td style="display:flex;gap:6px;">
          <button class="action-btn" onclick="editCourse('${c.id}')">Editar</button>
          <button class="action-btn danger">Arquivar</button>
        </td>
      </tr>`).join('');

    mc.innerHTML = `
      <div class="page-title">📚 Cursos</div>
      <div class="page-subtitle">${courses?.length || 0} cursos cadastrados</div>

      <div class="panel">
        <div class="panel-header">
          <h3>Todos os Cursos</h3>
          <button class="panel-action">+ Novo Curso</button>
        </div>
        <div class="panel-body" style="overflow-x:auto;">
          <table>
            <thead><tr><th>Curso</th><th>Carga</th><th>Status</th><th>Preço</th><th>Ações</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Nenhum curso</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  async function renderStudents(mc) {
    const usersRes = await fetch(API+'/admin/users', { headers: h() });
    const users = await usersRes.json();

    const rows = (users || []).map(s => `
      <tr>
        <td><strong>${s.name || 'Sem nome'}</strong></td>
        <td>${s.email || '-'}</td>
        <td>${s.matricula || '-'}</td>
        <td>${s.role === 'admin' ? '<span class="badge badge-yellow">Admin</span>' : s.role === 'tutor' ? '<span class="badge badge-blue">Tutor</span>' : '<span class="badge badge-green">Aluno</span>'}</td>
        <td>${s.mirc_code ? '<span class="badge badge-green">✓ '+s.mirc_code+'</span>' : '<span class="badge badge-red">Sem MIRC</span>'}</td>
      </tr>`).join('');

    mc.innerHTML = `
      <div class="page-title">👥 Alunos</div>
      <div class="page-subtitle">${users?.length || 0} perfis cadastrados</div>

      <div class="panel">
        <div class="panel-header">
          <h3>Todos os Alunos</h3>
        </div>
        <div class="panel-body" style="overflow-x:auto;">
          <table>
            <thead><tr><th>Nome</th><th>Email</th><th>Matrícula</th><th>Papel</th><th>MIRC</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Nenhum aluno</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  async function renderMIRC(mc) {
    const mircRes = await fetch(API+'/mirc/admin/listar', { headers: h() });
    const profiles = await mircRes.json();

    const rows = (profiles || []).map(p => `
      <tr>
        <td><strong>${p.name || '-'}</strong></td>
        <td>${p.email || '-'}</td>
        <td><code>${p.mirc_code}</code></td>
        <td>${p.mirc_status === 'active' ? '<span class="badge badge-green">Ativo</span>' : '<span class="badge badge-red">'+ (p.mirc_status||'pendente') +'</span>'}</td>
        <td>${p.mirc_issued_at ? new Date(p.mirc_issued_at).toLocaleDateString('pt-BR') : '-'}</td>
      </tr>`).join('');

    mc.innerHTML = `
      <div class="page-title">🔍 Registro MIRC</div>
      <div class="page-subtitle">Ministério Internacional de Registro de Capelães — ${profiles?.length || 0} registros</div>

      <div class="panel">
        <div class="panel-header">
          <h3>Registros MIRC</h3>
        </div>
        <div class="panel-body" style="overflow-x:auto;">
          <table>
            <thead><tr><th>Nome</th><th>Email</th><th>Código MIRC</th><th>Status</th><th>Emissão</th></tr></thead>
            <tbody>${rows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted)">Nenhum registro MIRC</td></tr>'}</tbody>
          </table>
        </div>
      </div>`;
  }

  // === MODAL SYSTEM ===
  let modalZ = 1000;
  function openModal(title, bodyHtml, onSave, width = '720px') {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:'+(++modalZ)+';background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:20px;';
    overlay.onclick = (e) => { if(e.target===overlay) overlay.remove(); };

    const box = document.createElement('div');
    box.style.cssText = 'background:var(--navy-card);border:1px solid var(--border);border-radius:12px;width:100%;max-width:'+width+';max-height:85vh;overflow-y:auto;padding:0;';

    box.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--navy-card);z-index:1;border-radius:12px 12px 0 0;">
        <h3 style="font-family:'Libre Baskerville',serif;font-size:18px;color:var(--gold);margin:0;">${title}</h3>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;line-height:1;padding:0;">&times;</button>
      </div>
      <div style="padding:22px;">${bodyHtml}</div>
      ${onSave ? `<div style="padding:16px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--navy-card);border-radius:0 0 12px 12px;">
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:1px solid var(--border);color:var(--text-secondary);padding:8px 18px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;">Cancelar</button>
        <button id="modalSaveBtn" style="background:var(--gold);border:none;color:var(--navy);padding:8px 24px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;">Salvar</button>
      </div>` : ''}
    `;

    overlay.appendChild(box);
    document.body.appendChild(overlay);

    if(onSave) {
      document.getElementById('modalSaveBtn').onclick = async () => {
        const btn = document.getElementById('modalSaveBtn');
        btn.textContent = 'Salvando...';
        btn.disabled = true;
        try { await onSave(overlay); overlay.remove(); } catch(e) { btn.textContent = 'Salvar'; btn.disabled = false; alert('Erro: '+e.message); }
      };
    }

    document.addEventListener('keydown', function escClose(e) { if(e.key==='Escape') { overlay.remove(); this.removeEventListener('keydown', escClose); } });
  }

  function formField(label, name, value='', type='text', placeholder='', opts={}) {
    const id = 'f_'+name+'_'+Date.now()%10000;
    if(type==='textarea') {
      return `<div style="margin-bottom:14px;"><label for="${id}" style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">${label}</label><textarea id="${id}" name="${name}" placeholder="${placeholder}" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;min-height:80px;resize:vertical;">${value}</textarea></div>`;
    }
    if(type==='select') {
      const options = (opts.options||[]).map(o => `<option value="${o.value}" ${o.value==value?'selected':''}>${o.label}</option>`).join('');
      return `<div style="margin-bottom:14px;"><label for="${id}" style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">${label}</label><select id="${id}" name="${name}" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;">${options}</select></div>`;
    }
    if(type==='toggle') {
      return `<div style="margin-bottom:14px;display:flex;align-items:center;gap:10px;"><label style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;">${label}</label><input type="checkbox" id="${id}" name="${name}" ${value?'checked':''} style="accent-color:var(--gold);"></div>`;
    }
    return `<div style="margin-bottom:14px;"><label for="${id}" style="display:block;font-size:11px;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;">${label}</label><input type="${type}" id="${id}" name="${name}" value="${value}" placeholder="${placeholder}" style="width:100%;background:var(--navy);border:1px solid var(--border);border-radius:7px;padding:10px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;"></div>`;
  }

  function getFormData(container) {
    const data = {};
    container.querySelectorAll('[name]').forEach(el => {
      if(el.type==='checkbox') data[el.name] = el.checked ? 1 : 0;
      else data[el.name] = el.value;
    });
    return data;
  }

  // === COURSE EDITOR ===
  async function editCourse(id) {
    let course = { id:'', title:'', slug:'', subtitle:'', description:'', color:'#C79A2E', image:'', hours:0, price_cents:0, active:1 };
    let modules = [];

    if(id) {
      const res = await fetch(API+'/admin/courses/'+id, { headers:h() });
      if(res.ok) {
        const data = await res.json();
        course = data.course || data;
        modules = data.modules || [];
      }
    }

    function buildForm() {
      return `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          ${formField('Título *','title',course.title,'text','Ex: Formação em Capelania Cristã')}
          ${formField('Slug *','slug',course.slug,'text','ex: capelania-crista')}
          ${formField('Subtítulo','subtitle',course.subtitle||'','text','Ex: Curso completo de 150h')}
          ${formField('Cor','color',course.color||'#C79A2E','text')}
          ${formField('Imagem URL','image',course.image||'','text','/img/cursos/curso.png')}
          ${formField('Carga Horária','hours',String(course.hours||0),'number')}
          ${formField('Preço (centavos)','price_cents',String(course.price_cents||0),'number','0 = Grátis')}
          ${formField('Ativo','active',course.active?1:0,'toggle')}
        </div>
        ${formField('Descrição','description',course.description||'','textarea','Descrição completa do curso...')}

        <h4 style="font-family:'Libre Baskerville',serif;font-size:15px;margin:24px 0 12px;color:var(--gold);">Módulos (${modules.length})</h4>
        <div id="modulesList">${modules.map((m,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--navy);border-radius:7px;margin-bottom:6px;font-size:13px;">
            <span style="color:var(--text-muted);font-size:11px;width:20px;">${i+1}.</span>
            <span style="flex:1;color:var(--white);">${m.title}</span>
            <span style="color:var(--text-muted);font-size:11px;">${m.lessons?.length||0} aulas</span>
            <button onclick="editModule('${m.id}','${course.id||'new'}',()=>editCourse('${course.id||''}'))" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;">Editar</button>
            <button onclick="deleteModule('${m.id}',()=>editCourse('${course.id||''}'))" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:12px;">Remover</button>
          </div>`).join('') || '<p style="color:var(--text-muted);font-size:12px;">Nenhum módulo. Salve o curso primeiro.</p>'}</div>
        ${course.id ? `<button onclick="addModule('${course.id}',()=>editCourse('${course.id}'))" style="margin-top:10px;font-size:12px;background:none;border:1px dashed var(--border);color:var(--gold);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;">+ Adicionar Módulo</button>` : ''}
      `;
    }

    openModal(
      id ? 'Editar Curso' : 'Novo Curso',
      buildForm(),
      async (overlay) => {
        const data = getFormData(overlay);
        if(!data.title || !data.slug) throw new Error('Título e Slug são obrigatórios');
        data.hours = parseInt(data.hours)||0;
        data.price_cents = parseInt(data.price_cents)||0;
        data.active = data.active ? 1 : 0;
        const method = id ? 'PUT' : 'POST';
        const url = id ? API+'/admin/courses/'+id : API+'/admin/courses';
        const res = await fetch(url, { method, headers:h(), body:JSON.stringify(data) });
        if(!res.ok) { const err=await res.json(); throw new Error(err.error||'Erro ao salvar'); }
        showSection('courses');
      },
      '800px'
    );
  }

  // === MODULE EDITOR ===
  async function editModule(moduleId, courseId, refreshFn) {
    let mod = { id:'', title:'', order_num:1, course_id:courseId };
    let lessons = [];

    if(moduleId) {
      const res = await fetch(API+'/admin/modules/'+moduleId, { headers:h() });
      if(res.ok) { const data = await res.json(); mod = data.module||data; lessons = data.lessons||[]; }
    }

    function buildModuleForm() {
      return `
        ${formField('Título do Módulo *','title',mod.title,'text','Ex: Fundamentos da Capelania')}
        ${formField('Ordem','order_num',String(mod.order_num||1),'number')}

        <h4 style="font-family:'Libre Baskerville',serif;font-size:15px;margin:24px 0 12px;color:var(--gold);">Aulas (${lessons.length})</h4>
        <div>${lessons.map((l,i) => `
          <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--navy);border-radius:7px;margin-bottom:6px;font-size:13px;">
            <span style="color:var(--text-muted);font-size:11px;width:20px;">${i+1}.</span>
            <span style="flex:1;color:var(--white);">${l.title}</span>
            <span style="color:var(--text-muted);font-size:11px;">${l.content_type||'video'}</span>
            <button onclick="editLesson('${l.id}','${mod.id}','${courseId}',()=>editModule('${mod.id}','${courseId}',${refreshFn?refreshFn.toString():'null'}))" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:12px;">Editar</button>
            <button onclick="deleteLesson('${l.id}',()=>editModule('${mod.id}','${courseId}',${refreshFn?refreshFn.toString():'null'}))" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:12px;">Remover</button>
          </div>`).join('') || '<p style="color:var(--text-muted);font-size:12px;">Nenhuma aula.</p>'}</div>
        ${mod.id ? `<button onclick="addLesson('${mod.id}','${courseId}',()=>editModule('${mod.id}','${courseId}',${refreshFn?refreshFn.toString():'null'}))" style="margin-top:10px;font-size:12px;background:none;border:1px dashed var(--border);color:var(--gold);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;">+ Adicionar Aula</button>
          <button onclick="manageQuiz('${mod.id}','${courseId}')" style="margin-top:8px;font-size:12px;background:rgba(199,154,46,0.1);border:1px solid rgba(199,154,46,0.3);color:var(--gold);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;">📝 Gerenciar Quiz</button>` : ''}
      `;
    }

    openModal(
      moduleId ? 'Editar Módulo' : 'Novo Módulo',
      buildModuleForm(),
      async (overlay) => {
        const data = getFormData(overlay);
        if(!data.title) throw new Error('Título do módulo é obrigatório');
        data.order_num = parseInt(data.order_num)||1;
        const method = moduleId ? 'PUT' : 'POST';
        const url = moduleId ? API+'/admin/modules/'+moduleId : API+'/admin/modules';
        const body = { ...data, course_id:courseId };
        const res = await fetch(url, { method, headers:h(), body:JSON.stringify(body) });
        if(!res.ok) { const err=await res.json(); throw new Error(err.error||'Erro ao salvar módulo'); }
        if(refreshFn) { refreshFn(); } else { showSection('courses'); }
      }
    );
  }

  function addModule(courseId, refreshFn) { editModule(null, courseId, refreshFn); }

  async function deleteModule(moduleId, refreshFn) {
    if(!confirm('Remover este módulo e todas as suas aulas?')) return;
    const res = await fetch(API+'/admin/modules/'+moduleId, { method:'DELETE', headers:h() });
    if(!res.ok) { alert('Erro ao remover módulo'); return; }
    if(refreshFn) refreshFn(); else showSection('courses');
  }

  // === LESSON EDITOR ===
  async function editLesson(lessonId, moduleId, courseId, refreshFn) {
    let lesson = { id:'', title:'', content:'', video_url:'', content_type:'video', order_num:1, is_free:0, module_id:moduleId };

    if(lessonId) {
      const res = await fetch(API+'/admin/lessons/'+lessonId, { headers:h() });
      if(res.ok) { const data = await res.json(); lesson = data.lesson || data; }
    }

    function buildLessonForm() {
      return `
        ${formField('Título da Aula *','title',lesson.title,'text','Ex: Introdução à Capelania')}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          ${formField('Tipo','content_type',lesson.content_type||'video','select','',{options:[{value:'video',label:'Vídeo'},{value:'text',label:'Texto'},{value:'quiz',label:'Quiz'}]})}
          ${formField('Ordem','order_num',String(lesson.order_num||1),'number')}
          ${formField('Grátis','is_free',lesson.is_free?1:0,'toggle')}
        </div>
        ${formField('URL do Vídeo','video_url',lesson.video_url||'','text','https://youtube.com/embed/...')}
        ${formField('Conteúdo','content',lesson.content||'','textarea','Conteúdo da aula (HTML permitido)...')}
      `;
    }

    openModal(
      lessonId ? 'Editar Aula' : 'Nova Aula',
      buildLessonForm(),
      async (overlay) => {
        const data = getFormData(overlay);
        if(!data.title) throw new Error('Título da aula é obrigatório');
        data.order_num = parseInt(data.order_num)||1;
        data.is_free = data.is_free ? 1 : 0;
        const method = lessonId ? 'PUT' : 'POST';
        const url = lessonId ? API+'/admin/lessons/'+lessonId : API+'/admin/lessons';
        const body = { ...data, module_id:moduleId };
        const res = await fetch(url, { method, headers:h(), body:JSON.stringify(body) });
        if(!res.ok) { const err=await res.json(); throw new Error(err.error||'Erro ao salvar aula'); }
        if(refreshFn) { refreshFn(); } else { showSection('courses'); }
      }
    );
  }

  function addLesson(moduleId, courseId, refreshFn) { editLesson(null, moduleId, courseId, refreshFn); }

  async function deleteLesson(lessonId, refreshFn) {
    if(!confirm('Remover esta aula?')) return;
    const res = await fetch(API+'/admin/lessons/'+lessonId, { method:'DELETE', headers:h() });
    if(!res.ok) { alert('Erro ao remover aula'); return; }
    if(refreshFn) refreshFn(); else showSection('courses');
  }

  // === QUIZ MANAGER ===
  async function manageQuiz(moduleId, courseId) {
    let quiz = null;
    let questions = [];
    const qRes = await fetch(API+'/admin/modules/'+moduleId+'/quiz', { headers:h() });
    if(qRes.ok) { const data = await qRes.json(); quiz = data.quiz||data; questions = data.questions||[]; }

    function buildQuizForm() {
      return `
        ${quiz ? `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;">Quiz: <strong>${quiz.title||'Sem título'}</strong> — Nota mínima: ${quiz.passing_score||70}%</p>` : ''}
        ${formField('Título do Quiz','quizTitle',quiz?.title||'','text','Quiz do Módulo')}
        ${formField('Nota Mínima (%)','passingScore',String(quiz?.passing_score||70),'number')}
        ${formField('Tentativas Máximas','maxAttempts',String(quiz?.max_attempts||3),'number')}

        <h4 style="font-family:'Libre Baskerville',serif;font-size:15px;margin:24px 0 12px;color:var(--gold);">Questões (${questions.length})</h4>
        <div>${questions.map((q,i) => `
          <div style="padding:10px 12px;background:var(--navy);border-radius:7px;margin-bottom:8px;font-size:13px;">
            <div style="color:var(--gold);font-size:11px;margin-bottom:4px;">Q${i+1}</div>
            <div style="color:var(--white);margin-bottom:6px;">${q.question||q.text||'Sem texto'}</div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${(q.options||[]).map((o,j) => `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${j===q.correct_answer?\'rgba(199,154,46,0.15)\':\'rgba(255,255,255,0.04)\'};color:${j===q.correct_answer?\'var(--gold)\':\'var(--text-muted)\'};">${String.fromCharCode(65+j)}) ${o}</span>`).join('')}
            </div>
            <div style="margin-top:8px;">
              <button onclick="editQuestion('${q.id}','${moduleId}',()=>manageQuiz('${moduleId}','${courseId}'))" style="background:none;border:none;color:var(--gold);cursor:pointer;font-size:11px;">Editar</button>
              <button onclick="deleteQuestion('${q.id}',()=>manageQuiz('${moduleId}','${courseId}'))" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:11px;margin-left:8px;">Remover</button>
            </div>
          </div>`).join('') || '<p style="color:var(--text-muted);font-size:12px;">Nenhuma questão.</p>'}</div>
        <button onclick="addQuestion('${moduleId}','${courseId}')" style="margin-top:10px;font-size:12px;background:none;border:1px dashed var(--border);color:var(--gold);padding:8px 16px;border-radius:7px;cursor:pointer;font-family:'Inter',sans-serif;width:100%;">+ Adicionar Questão</button>
      `;
    }

    openModal(
      'Gerenciar Quiz',
      buildQuizForm(),
      async (overlay) => {
        const data = getFormData(overlay);
        const quizData = {
          title: data.quizTitle || 'Quiz',
          passing_score: parseInt(data.passingScore)||70,
          max_attempts: parseInt(data.maxAttempts)||3,
          module_id: moduleId
        };
        const url = quiz ? API+'/admin/quizzes/'+quiz.id : API+'/admin/modules/'+moduleId+'/quiz';
        const method = quiz ? 'PUT' : 'POST';
        const res = await fetch(url, { method, headers:h(), body:JSON.stringify(quizData) });
        if(!res.ok) { const err=await res.json(); throw new Error(err.error||'Erro ao salvar quiz'); }
      }
    );
  }

  async function addQuestion(moduleId, courseId) {
    openModal(
      'Nova Questão',
      `
        ${formField('Pergunta *','question','','text','Digite a pergunta...')}
        ${['A','B','C','D'].map(l => formField('Opção '+l,'opt_'+l,'','text','Alternativa '+l)).join('')}
        ${formField('Resposta Correta','correct_answer','0','select','',{options:[{value:'0',label:'A'},{value:'1',label:'B'},{value:'2',label:'C'},{value:'3',label:'D'}]})}
      `,
      async (overlay) => {
        const data = getFormData(overlay);
        if(!data.question) throw new Error('Pergunta é obrigatória');
        const options = [data.opt_A, data.opt_B, data.opt_C, data.opt_D].filter(o=>o);
        if(options.length < 2) throw new Error('Mínimo 2 opções');
        const body = {
          module_id: moduleId,
          question: data.question,
          options: options,
          correct_answer: parseInt(data.correct_answer)||0
        };
        const res = await fetch(API+'/admin/questions', { method:'POST', headers:h(), body:JSON.stringify(body) });
        if(!res.ok) { const err=await res.json(); throw new Error(err.error||'Erro ao salvar questão'); }
        manageQuiz(moduleId, courseId);
      }
    );
  }

  async function editQuestion(questionId, moduleId, refreshFn) {
    let q = { id:questionId, question:'', options:[], correct_answer:0 };
    const res = await fetch(API+'/admin/questions/'+questionId, { headers:h() });
    if(res.ok) { const data = await res.json(); q = data.question||data; }
    const opts = q.options||[];

    openModal(
      'Editar Questão',
      `
        ${formField('Pergunta *','question',q.question||'','text')}
        ${['A','B','C','D'].map((l,i) => formField('Opção '+l,'opt_'+l,opts[i]||'','text','Alternativa '+l)).join('')}
        ${formField('Resposta Correta','correct_answer',String(q.correct_answer||0),'select','',{options:[{value:'0',label:'A'},{value:'1',label:'B'},{value:'2',label:'C'},{value:'3',label:'D'}]})}
      `,
      async (overlay) => {
        const data = getFormData(overlay);
        const options = [data.opt_A, data.opt_B, data.opt_C, data.opt_D].filter(o=>o);
        const body = {
          question: data.question,
          options: options,
          correct_answer: parseInt(data.correct_answer)||0
        };
        const r = await fetch(API+'/admin/questions/'+questionId, { method:'PUT', headers:h(), body:JSON.stringify(body) });
        if(!r.ok) { const err=await r.json(); throw new Error(err.error||'Erro ao salvar'); }
        if(refreshFn) refreshFn();
      }
    );
  }

  async function deleteQuestion(questionId, refreshFn) {
    if(!confirm('Remover esta questão?')) return;
    const res = await fetch(API+'/admin/questions/'+questionId, { method:'DELETE', headers:h() });
    if(!res.ok) { alert('Erro ao remover'); return; }
    if(refreshFn) refreshFn();
  }

  // Hook up "Novo Curso" button
  document.addEventListener('click', function(e) {
    if(e.target.closest('.panel-action') && e.target.closest('.panel-action').textContent.includes('Novo Curso')) {
      e.preventDefault();
      editCourse(null);
    }
  });

  init();
</script>
</body>
</html>
