<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Instituto Lumethos</title>
  <link rel="icon" type="image/x-icon" href="../img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-container {
      display: flex;
      max-width: 900px;
      width: 100%;
      min-height: 560px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      border: 1px solid #f0f0f0;
    }
    .login-left {
      flex: 1;
      background: #0D1B2A;
      padding: 56px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .login-left::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(199,154,46,0.03) 0%, transparent 70%);
    }
    .login-left .logo-wrap {
      position: relative;
      z-index: 1;
      margin-bottom: 32px;
    }
    .login-left .logo-wrap img {
      height: 52px;
      display: block;
    }
    .login-left .badge {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(199,154,46,0.12);
      color: #C79A2E;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      align-self: flex-start;
      position: relative;
      z-index: 1;
    }
    .login-left h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
      position: relative;
      z-index: 1;
    }
    .login-left p {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255,255,255,0.45);
      position: relative;
      z-index: 1;
    }
    .login-left .features {
      margin-top: 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      z-index: 1;
    }
    .login-left .features .feat {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .login-left .features .feat svg {
      width: 16px;
      height: 16px;
      fill: rgba(199,154,46,0.5);
      flex-shrink: 0;
    }
    .login-right {
      flex: 1;
      padding: 56px 48px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #fff;
    }
    .login-right h2 {
      font-size: 20px;
      font-weight: 600;
      color: #0D1B2A;
      margin-bottom: 4px;
    }
    .login-right .sub {
      color: #999;
      font-size: 13px;
      margin-bottom: 28px;
    }
    .role-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    .role-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      transition: all 0.15s;
    }
    .role-btn svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }
    .role-btn.active {
      border-color: #C79A2E;
      background: rgba(199,154,46,0.06);
      color: #0D1B2A;
    }
    .role-btn.active svg { fill: #C79A2E; }
    .role-btn:not(.active):hover { border-color: #d1d5db; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.15s;
      outline: none;
      background: #fafafa;
    }
    .form-group input:focus {
      border-color: #C79A2E;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(199,154,46,0.08);
    }
    .btn-login {
      width: 100%;
      padding: 12px;
      background: #C79A2E;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover { background: #b8891f; }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-login svg {
      width: 16px; height: 16px;
      fill: currentColor;
    }
    .login-error {
      display: none;
      margin-top: 14px;
      padding: 10px 14px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 10px;
      color: #dc2626;
      font-size: 12px;
    }
    .login-error.show { display: block; }
    .login-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 12px;
      color: #bbb;
    }
    .login-footer a { color: #C79A2E; text-decoration: none; }
    .login-footer a:hover { text-decoration: underline; }
    @media (max-width: 640px) {
      .login-container { flex-direction: column; min-height: auto; border-radius: 14px; }
      .login-left { padding: 36px 28px; }
      .login-left h1 { font-size: 20px; }
      .login-left .features { display: none; }
      .login-right { padding: 32px 24px; }
    }
  </style>
<style>.nav-top{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(13,27,42,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;padding:8px 20px;gap:12px;border-bottom:1px solid rgba(199,154,46,0.1)}.nav-top a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);padding:5px 12px;border-radius:8px;transition:all 0.15s}.nav-top a:hover{background:rgba(255,255,255,0.1);color:#C79A2E}.nav-top a svg{width:16px;height:16px;fill:currentColor}.nav-top .spacer{flex:1}.nav-top .logo-mini{height:20px;opacity:0.35}body{padding-top:44px}</style>
</head>
<body>
  <div class="nav-top"><a href="javascript:history.back()" title="Voltar"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Voltar</a><a href="/" title="Página Inicial"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Início</a><span class="spacer"></span><img class="logo-mini" src="../img/logo-lumethos-correto.png" alt="Lumethos"></div>
  <div class="login-container">
    <div class="login-left">
      <div class="logo-wrap">
        <img src="../img/logo-lumethos-correto.png" alt="Lumethos">
      </div>
      <div class="badge">ÁREA RESTRITA</div>
      <h1>Painel<br>Administrativo</h1>
      <p>Gerencie cursos, alunos, tutores e acompanhe o progresso da plataforma.</p>
      <div class="features">
        <div class="feat">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Gestão de cursos e módulos</span>
        </div>
        <div class="feat">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Controle de alunos e tutores</span>
        </div>
        <div class="feat">
          <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          <span>Acompanhamento de progresso</span>
        </div>
      </div>
    </div>
    <div class="login-right">
      <h2>Acessar</h2>
      <p class="sub">Faça login como administrador ou tutor</p>

      <div class="role-selector" id="roleSelector">
        <button class="role-btn active" data-role="admin">
          <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          Administrador
        </button>
        <button class="role-btn" data-role="tutor">
          <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9h-4v4h-2v-4H9V9h4V5h2v4h4v2z"/></svg>
          Tutor
        </button>
      </div>

      <form id="loginForm" onsubmit="return fazerLogin(event)">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" id="btn-login" class="btn-login">
          <svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg>
          Entrar
        </button>
      </form>

      <div id="login-error" class="login-error"></div>

      <div class="login-footer">
        <a href="../login.html">← Voltar para Área do Aluno</a>
      </div>
    </div>
  </div>

  <script src="/js/juju-chat.js"></script>
  <script>
    document.getElementById('roleSelector').addEventListener('click', function(e) {
      if (e.target.classList.contains('role-btn') || e.target.closest('.role-btn')) {
        const btn = e.target.classList.contains('role-btn') ? e.target : e.target.closest('.role-btn');
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }
    });

    async function fazerLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value;
      const btn = document.getElementById('btn-login');
      const errEl = document.getElementById('login-error');
      const roleBtn = document.querySelector('.role-btn.active');
      const selectedRole = roleBtn ? roleBtn.dataset.role : 'admin';

      errEl.classList.remove('show');
      if (!email || !senha) {
        errEl.textContent = 'Preencha e-mail e senha.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top:2px solid #fff;border-radius:50%;animation:spin 0.6s linear infinite;display:inline-block;"></span> Entrando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password: senha})
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'E-mail ou senha incorretos.');

        localStorage.setItem('lms_token', data.token);
        localStorage.setItem('lms_user', JSON.stringify(data.user));

        const papel = data.user.papel;
        if (papel === 'admin') window.location.href = 'index.html';
        else if (papel === 'tutor') window.location.href = '/tutor/index.html';
        else if (papel === 'aluno') window.location.href = '/aluno.html';
        else window.location.href = 'index.html';
      } catch(e) {
        errEl.textContent = e.message || 'Erro ao fazer login.';
        errEl.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M11 7L9.6 8.4l2.6 2.6H2v2h10.2l-2.6 2.6L11 17l5-5-5-5zm9 12h-8v2h8c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-8v2h8v14z"/></svg> Entrar';
      }
    }
  </script>
</body>
</html>
