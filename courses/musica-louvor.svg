    <text x="0" y="5" text-anchor="middle" fill="#C4953A" font-family="serif" font-size="18" font-weight="bold" opacity="0.6">L</text>
  </g>
  <text x="300" y="555" text-anchor="middle" fill="#E8C76A" font-family="Georgia, serif" font-size="28" letter-spacing="2">MINISTÉRIO DA</text>
  <text x="300" y="605" text-anchor="middle" fill="#E8C76A" font-family="Georgia, serif" font-size="34" font-weight="bold" letter-spacing="2">MÚSICA E LOUVOR</text>
  <text x="300" y="810" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">INSTITUTO LUMETHOS</text>
