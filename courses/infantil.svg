<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#2A1A2A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4953A"/>
      <stop offset="100%" style="stop-color:#E8C76A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(196,149,58,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(196,149,58,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="400" ry="300" fill="url(#glow)"/>
  <!-- Estrela/coração infantil estilizado -->
  <g transform="translate(300,340)" opacity="0.1">
    <path d="M0,-60 C20,-60 40,-40 40,-20 C40,10 20,30 0,50 C-20,30 -40,10 -40,-20 C-40,-40 -20,-60 0,-60 Z" fill="#E8C76A"/>
    <circle cx="-12" cy="-25" r="4" fill="#E8C76A"/>
    <circle cx="12" cy="-25" r="4" fill="#E8C76A"/>
    <path d="M-12,-10 C-8,-5 8,-5 12,-10" fill="none" stroke="#E8C76A" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <circle cx="300" cy="340" r="110" fill="none" stroke="rgba(196,149,58,0.05)" stroke-width="1"/>
  <g opacity="0.12">
    <rect x="180" y="500" width="240" height="1" fill="#C4953A"/>
    <rect x="210" y="510" width="180" height="1" fill="#C4953A"/>
  </g>
  <g transform="translate(300,750)">
