<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#162040"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4953A"/>
      <stop offset="100%" style="stop-color:#E8C76A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(196,149,58,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(196,149,58,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="400" ry="300" fill="url(#glow)"/>
  <!-- Livro aberto estilizado -->
  <g transform="translate(300,340)" opacity="0.1">
    <path d="M-80,-40 L-10,-50 L80,-40 L80,40 L-10,50 L-80,40 Z" fill="none" stroke="#E8C76A" stroke-width="1.5"/>
    <line x1="-10" y1="-50" x2="-10" y2="50" stroke="#E8C76A" stroke-width="1"/>
    <line x1="-45" y1="-30" x2="-10" y2="-35" stroke="#E8C76A" stroke-width="0.8"/>
    <line x1="-45" y1="-10" x2="-10" y2="-15" stroke="#E8C76A" stroke-width="0.8"/>
    <line x1="-45" y1="10" x2="-10" y2="5" stroke="#E8C76A" stroke-width="0.8"/>
    <line x1="10" y1="-35" x2="45" y2="-30" stroke="#E8C76A" stroke-width="0.8"/>
    <line x1="10" y1="-15" x2="45" y2="-10" stroke="#E8C76A" stroke-width="0.8"/>
    <line x1="10" y1="5" x2="45" y2="10" stroke="#E8C76A" stroke-width="0.8"/>
  </g>
  <circle cx="300" cy="340" r="110" fill="none" stroke="rgba(196,149,58,0.05)" stroke-width="1"/>
  <circle cx="300" cy="340" r="130" fill="none" stroke="rgba(196,149,58,0.03)" stroke-width="0.5"/>
  <g opacity="0.12">
