<svg xmlns="http://www.w3.org/2000/svg" width="600" height="900" viewBox="0 0 600 900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1628"/>
      <stop offset="50%" style="stop-color:#1B2A4A"/>
      <stop offset="100%" style="stop-color:#1A2A1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C4953A"/>
      <stop offset="100%" style="stop-color:#E8C76A"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(196,149,58,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(196,149,58,0)"/>
    </linearGradient>
  </defs>
  <rect width="600" height="900" fill="url(#bg)"/>
  <ellipse cx="300" cy="200" rx="400" ry="300" fill="url(#glow)"/>
  <!-- Mãos servindo estilizadas -->
  <g transform="translate(300,330)" opacity="0.1">
    <path d="M-50,30 C-50,0 -30,-30 0,-40 C30,-30 50,0 50,30" fill="none" stroke="#E8C76A" stroke-width="1.5"/>
    <path d="M-30,30 C-30,5 -15,-15 0,-20 C15,-15 30,5 30,30" fill="none" stroke="#E8C76A" stroke-width="1"/>
    <circle cx="0" cy="5" r="30" fill="none" stroke="#E8C76A" stroke-width="1"/>
    <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#E8C76A" stroke-width="0.8"/>
  </g>
  <circle cx="300" cy="340" r="110" fill="none" stroke="rgba(196,149,58,0.05)" stroke-width="1"/>
  <circle cx="300" cy="340" r="130" fill="none" stroke="rgba(196,149,58,0.03)" stroke-width="0.5"/>
  <g opacity="0.12">
    <rect x="230" y="500" width="140" height="1" fill="#C4953A"/>
    <rect x="200" y="510" width="200" height="1" fill="#C4953A"/>
  </g>
  <g transform="translate(300,750)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="rgba(196,149,58,0.15)" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#C4953A" font-family="serif" font-size="18" font-weight="bold" opacity="0.6">L</text>
  </g>
  <text x="300" y="580" text-anchor="middle" fill="#E8C76A" font-family="Georgia, serif" font-size="42" font-weight="bold" letter-spacing="4">DIACONIA</text>
  <text x="300" y="810" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="Arial, sans-serif" font-size="12" letter-spacing="3">INSTITUTO LUMETHOS</text>
</svg>
