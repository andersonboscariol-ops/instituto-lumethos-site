<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Aluno — Instituto Lumethos</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--blue:#0D1B2A;--blue2:#142D4C;--gold:#C79A2E;--gold2:#d4aa3a;--white:#fff;--bg:#f5f5f5;--text:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;--shadow:0 8px 24px rgba(13,27,42,.08)}
    html,body{height:100%}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font-family:'Inter',sans-serif}
    .nav-top{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(13,27,42,0.7);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;padding:10px 20px;gap:12px;}
    .nav-top a{display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:13px;font-weight:500;color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:8px;transition:all 0.15s}
    .nav-top a:hover{background:rgba(255,255,255,0.1);color:#C79A2E}
    .nav-top a svg{width:18px;height:18px;fill:currentColor}
    .nav-top .spacer{flex:1}
    .nav-top .logo-mini{height:22px;opacity:0.4}
    .hidden{display:none!important}
    .login-screen{min-height:100vh;display:grid;grid-template-columns:1.1fr 0.9fr;background:var(--white)}
    .login-left{background:var(--blue);padding:56px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;color:#fff}
    .login-left:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 80% 20%,rgba(199,154,46,.25),transparent 40%)}
    .login-left h1{font-size:42px;line-height:1.05;margin:32px 0 12px;letter-spacing:-1.5px}
    .login-left p{color:rgba(255,255,255,.55);max-width:420px;font-size:15px;line-height:1.7}
    .login-right{display:flex;align-items:center;justify-content:center;padding:42px;background:var(--white)}
    .login-card{max-width:400px;width:100%}
    .login-card h2{font-size:24px;margin-bottom:6px;color:var(--blue)}
    .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
    .role-selector{display:flex;gap:10px;margin-bottom:20px}
    .role-btn{flex:1;border:1px solid var(--border);background:#fff;border-radius:12px;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:12px;color:#666;transition:.15s}
    .role-btn.active{border-color:var(--gold);background:rgba(199,154,46,.08);color:var(--blue)}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:11px;font-weight:800;color:#555;margin-bottom:7px;text-transform:uppercase}
    .form-group input{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:10px;background:#fafafa;font-size:14px}
    .btn{width:100%;padding:12px;border-radius:10px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:13px;border:0}
    .btn-gold{background:var(--gold);color:#fff}
    .btn-gold:hover{background:var(--gold2)}
    .login-error{display:none;margin-top:14px;padding:10px 12px;background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;font-size:13px}
    .login-error.show{display:block}
    .shell{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--blue);min-height:100vh;position:fixed;left:0;top:0;color:#fff}
    .side-logo{padding:20px 18px;border-bottom:1px solid rgba(255,255,255,.05)}
    .side-logo img{height:48px}
    .side-nav{padding:12px;flex:1}
    .nav-item{height:40px;display:flex;align-items:center;gap:12px;padding:0 12px;border-radius:10px;color:rgba(255,255,255,.55);cursor:pointer;font-size:13px;font-weight:700;margin-bottom:3px;transition:.15s}
    .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
    .nav-item.active{background:rgba(199,154,46,.12);color:var(--gold)}
    .side-footer{padding:16px;border-top:1px solid rgba(255,255,255,.05)}
    .avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);color:var(--blue);display:inline-flex;align-items:center;justify-content:center;font-weight:900}
    .main{margin-left:240px;flex:1;background:var(--bg)}
    .topbar{height:60px;background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
    .topbar h1{font-size:18px;color:var(--blue)}
    .content{padding:24px}
    .panel{background:var(--white);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:20px;margin-bottom:20px}
    .panel h2{font-size:18px;color:var(--blue);margin-bottom:14px}
    .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
    .metric{padding:14px;border:1px solid var(--border);border-radius:12px;background:#fafafa}
    .metric .label{font-size:10px;color:var(--muted);text-transform:uppercase}
    .metric .value{font-size:24px;font-weight:800;color:var(--blue)}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--border);font-size:13px}
    th{color:#777;font-size:10px;text-transform:uppercase}
    .btn-sm{padding:6px 10px;font-size:11px;margin-right:6px}
    .btn-outline{background:transparent;border:1px solid var(--border);color:var(--blue)}
    .btn-danger{background:#ef4444;color:#fff;border:0;border-radius:6px;padding:5px 8px;font-size:11px;cursor:pointer}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .modal{background:#fff;border-radius:16px;width:100%;max-width:520px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .modal-body{padding:20px}
    .modal-foot{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
    textarea{width:100%;min-height:80px;padding:10px;border:1px solid var(--border);border-radius:8px;background:#fafafa;font-family:inherit}
    @media(max-width:700px){.sidebar{width:56px}.sidebar span,.side-footer .name,.side-footer .role{display:none}.main{margin-left:56px}.metrics{grid-template-columns:repeat(2,1fr)}.login-screen{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="nav-top">
    <a href="javascript:history.back()" title="Voltar">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Voltar
    </a>
    <a href="/" title="Página Inicial">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </a>
    <span class="spacer"></span>
    <img class="logo-mini" src="img/logo-lumethos-correto.png" alt="Lumethos">
  </div>
  <div id="app"></div>
  <script src="/js/api-config.js?v=3"></script>
  <script>
  (function(){
    const $ = (s,r=document)=>r.querySelector(s);
    const app = $('#app');
    let user = null;
    let state = {page:'login', cursos:[], usuarios:[], matriculas:[]};

    function init(){
      user = JSON.parse(localStorage.getItem('lms_user')||'null');
      if(user && localStorage.getItem('lms_token')){
        state.page='inicio';
        loadDados();
      } else {
        renderLogin();
      }
    }

    function renderLogin(){
      app.innerHTML = `
        <div class="login-screen">
          <div class="login-left">
            <div><img src="img/logo-lumethos-correto.png" height="100" style="display:block;margin-bottom:30px">
              <h1>Painel do Aluno</h1>
              <p>Plataforma de Ensino Lumethos — Acesso ao catálogo de cursos, progresso e ferramentas.</p>
            </div>
          </div>
          <div class="login-right">
            <div class="login-card">
              <h2>Entrar na Plataforma</h2>
              <p class="sub">Acesse com suas credenciais</p>
              <div class="role-selector" id="roleSel">
                <button class="role-btn active" data-role="admin">👑 Admin</button>
                <button class="role-btn" data-role="tutor">📚 Tutor</button>
                <button class="role-btn" data-role="aluno">🎓 Aluno</button>
              </div>
              <form id="loginForm">
                <div class="form-group">
                  <label>E-mail</label>
                  <input type="email" id="email" placeholder="seu@email.com" required>
                </div>
                <div class="form-group">
                  <label>Senha</label>
                  <input type="password" id="senha" placeholder="••••••••" required>
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="btn btn-gold" id="btnLogin">Entrar</button>
              </form>
            </div>
          </div>
        </div>`;
      let sel='admin';
      $$('.role-btn').forEach(b=>b.addEventListener('click',()=>{
        $$('.role-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
        sel=b.dataset.role;
      }));
      $('#loginForm').addEventListener('submit',async e=>{
        e.preventDefault();
        const btn=$('#btnLogin'), err=$('#loginError');
        btn.disabled=true; btn.textContent='Entrando...';
        err.classList.remove('show');
        try{
          const res=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:email.value.trim(),password:senha.value})});
          const data=await res.json();
          if(!res.ok) throw new Error(data.error||'Erro no login');
          if(sel!=='admin' && data.user.papel!==sel) throw new Error('Perfil não autorizado');
          localStorage.setItem('lms_token',data.token);
          localStorage.setItem('lms_user',JSON.stringify(data.user));
          user=data.user;
          state.page='inicio';
          loadDados().then(render);
        }catch(err){
          errEl.textContent=err.message;
          errEl.classList.add('show');
          btn.disabled=false;
          btn.textContent='Entrar';
        }
      });
    }

    async function loadDados(){
      state.cursos = await API.getCursos().catch(()=>[]);
      state.usuarios = await API.getUsuarios().catch(()=>[]);
      state.matriculas = await API.getMatriculasAluno ? await API.getMatriculasAluno() : [];
    }

    function render(){
      if(!user) return renderLogin();
      const isAdmin = user.papel==='admin';
      const isTutor = user.papel==='tutor';
      app.innerHTML = `
        <div class="shell">
          <div class="sidebar">
            <div class="side-logo"><img src="img/logo-lumethos-correto.png" height="40"></div>
            <div class="side-nav">
              <div class="nav-item active" data-page="inicio"><span>Início</span></div>
              <div class="nav-item" data-page="biblioteca"><span>📚 Biblioteca</span></div>
              <div class="nav-item" data-page="meuscursos"><span>🎓 Meus Cursos</span></div>
              ${isAdmin||isTutor?'<div class="nav-item" data-page="dashboard"><span>📊 Dashboard</span></div>':''}
              ${isAdmin?'<div class="nav-item" data-page="cursos"><span>📁 Cursos</span></div>':''}
              ${isAdmin||isTutor?'<div class="nav-item" data-page="alunos"><span>👥 Alunos</span></div>':''}
              ${isAdmin?'<div class="nav-item" data-page="config"><span>⚙️ Config</span></div>':''}
            </div>
            <div class="side-footer">
              <div class="user-mini">
                <div class="avatar">${(user.nome||'').charAt(0)}</div>
                <div><strong>${user.nome||''}</strong><span>${user.papel}</span></div>
              </div>
              <div class="logout" onclick="logout()">Sair</div>
            </div>
          </div>
          <div class="main">
            <div class="topbar"><h1>Instituto Lumethos</h1><div class="right">🕒 ${new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div></div>
            <div class="content" id="conteudo"></div>
          </div>
        </div>`;
      $$('[data-page]').forEach(el=>el.addEventListener('click',()=>{
        state.page=el.dataset.page;
        render();
        setTimeout(()=>renderPage(),10);
      }));
      renderPage();
    }

    function renderPage(){
      const c = $('#conteudo');
      if(!c) return;
      switch(state.page){
        case'inicio':
          c.innerHTML = `<div class="panel"><h2>Bem-vindo, ${user.nome||''}!</h2><p>Papel: <b>${user.papel}</b></p></div>
            <div class="metrics">
              <div class="metric"><div class="label">Cursos</div><div class="value">${state.cursos.length}</div></div>
              <div class="metric"><div class="label">Alunos</div><div class="value">${state.usuarios.filter(u=>u.papel==='aluno').length}</div></div>
              <div class="metric"><div class="label">Matriculados</div><div class="value">${state.matriculas.length}</div></div>
            </div>`;
          break;
        case'biblioteca':
          c.innerHTML = `<div class="panel"><h2>Biblioteca de Cursos</h2><p>Acesso a todos os cursos disponíveis.</p></div>
            <div class="panel"><div class="row" style="display:flex;gap:14px;overflow-x:auto">${state.cursos.map(cur=>{
              const modulos = cur.modulos||[];
              return `<div class="course-card" style="flex:0 0 220px;border-radius:12px;overflow:hidden;background:#1a1a2e;color:#fff"><div style="height:140px;background:linear-gradient(135deg,var(--blue),#142D4C)"></div>
                <div style="padding:12px"><h4 style="margin-bottom:6px">${cur.titulo}</h4><p style="font-size:12px;opacity:.8">${cur.descricao||''}</p></div></div>`;
            }).join('')}</div></div>`;
          break;
        case'meuscursos':
          c.innerHTML = `<div class="panel"><h2>Meus Cursos</h2><p>Progresso dos cursos matriculados.</p></div>`;
          break;
        case'dashboard':
          if(user.papel!=='admin') return c.innerHTML='<div class="panel"><h2>Acesso restrito</h2></div>';
          c.innerHTML = `<div class="panel"><h2>Dashboard Administrativo</h2><p>Visão geral do sistema.</p>
            <div class="metrics"><div class="metric"><div class="label">Receita</div><div class="value">R$ 0</div></div>
            <div class="metric"><div class="label">Alunos Ativos</div><div class="value">${state.usuarios.filter(u=>u.papel==='aluno').length}</div></div>
            <div class="metric"><div class="label">Cursos</div><div class="value">${state.cursos.length}</div></div></div>`;
          break;
        case'cursos':
          if(user.papel!=='admin') return c.innerHTML='<div class="panel"><h2>Acesso restrito</h2></div>';
          c.innerHTML = `<div class="panel"><h2>Gerenciar Cursos</h2><button class="btn btn-gold" style="max-width:160px" onclick="alert('Em breve')">+ Novo Curso</button>
            <table style="margin-top:16px"><tr><th>ID</th><th>Título</th><th>Status</th><th>Ações</th></tr>
            ${state.cursos.map(cur=>`<tr><td>${cur.id?.slice(0,8)}...</td><td>${cur.titulo}</td><td>Ativo</td><td><button class="btn-sm btn-outline">Editar</button></td></tr>`).join('')}</table></div>`;
          break;
        case'alunos':
          if(user.papel!=='admin'&&user.papel!=='tutor') return c.innerHTML='<div class="panel"><h2>Acesso restrito</h2></div>';
          c.innerHTML = `<div class="panel"><h2>Alunos</h2>
            <table><tr><th>Nome</th><th>Email</th><th>Papel</th></tr>
            ${state.usuarios.map(u=>`<tr><td>${u.nome}</td><td>${u.email}</td><td>${u.papel}</td></tr>`).join('')}</table></div>`;
          break;
        case'config':
          if(user.papel!=='admin') return c.innerHTML='<div class="panel"><h2>Acesso restrito</h2></div>';
          c.innerHTML = `<div class="panel"><h2>Configurações</h2><p>Ajustes gerais do sistema.</p></div>`;
          break;
        default:
          c.innerHTML = `<div class="panel"><h2>${state.page}</h2></div>`;
      }
    }

    function logout(){ localStorage.clear(); location.reload(); }
    window.logout=logout;
    init();
  })();
  </script>

          </div>

        <div class="footer-col footer-col--links">
          <h4 class="footer-col-title">Institucional</h4>
          <nav class="footer-nav">
