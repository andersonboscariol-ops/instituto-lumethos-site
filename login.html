<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar · Instituto Lumethos</title>
  <meta name="description" content="Acesse sua área do aluno no Instituto Lumethos">
  <link rel="icon" href="favicon.ico">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    :root{
      --bg-primary:#0D1B2A;
      --bg-secondary:#152238;
      --gold:#C79A2E;
      --gold-light:#e0b84c;
      --white:#fff;
      --text-secondary:rgba(255,255,255,.7);
      --danger:#ef4444;
      --success:#22c55e;
    }

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg-primary);
      color:var(--white);
      min-height:100vh;
      display:flex;align-items:center;justify-content:center;
      padding:24px;
    }

    .login-container{
      width:100%;max-width:420px;
    }

    .login-header{
      text-align:center;margin-bottom:32px;
    }
    .login-header .logo{
      font-family:'Libre Baskerville',serif;
      font-size:24px;color:var(--gold);
      margin-bottom:8px;
    }
    .login-header p{color:var(--text-secondary);font-size:14px;}

    .card{
      background:var(--bg-secondary);
      border-radius:16px;padding:32px;
      border:1px solid rgba(255,255,255,.06);
    }

    .form-group{margin-bottom:20px;}
    .form-group label{
      display:block;font-size:13px;font-weight:500;
      color:var(--text-secondary);margin-bottom:6px;
    }
    .form-group input{
      width:100%;padding:12px 16px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      border-radius:10px;color:var(--white);
      font-size:15px;font-family:'Inter',sans-serif;
      transition:border-color .2s;
    }
    .form-group input:focus{
      outline:none;border-color:var(--gold);
    }
    .form-group input::placeholder{color:rgba(255,255,255,.25);}

    .btn{
      width:100%;padding:14px;border:none;border-radius:10px;
      font-size:15px;font-weight:600;cursor:pointer;
      font-family:'Inter',sans-serif;
      transition:all .2s;
    }
    .btn-primary{
      background:var(--gold);color:var(--bg-primary);
    }
    .btn-primary:hover{background:var(--gold-light);}
    .btn-primary:disabled{opacity:.6;cursor:not-allowed;}

    .divider{
      display:flex;align-items:center;gap:12px;
      margin:24px 0;color:var(--text-secondary);
      font-size:12px;
    }
    .divider::before,.divider::after{
      content:'';flex:1;height:1px;
      background:rgba(255,255,255,.08);
    }

    .social-btn{
      width:100%;padding:12px;border:1px solid rgba(255,255,255,.12);
      border-radius:10px;background:transparent;color:var(--white);
      font-size:14px;font-weight:500;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:10px;
      transition:background .2s;
      font-family:'Inter',sans-serif;
    }
    .social-btn:hover{background:rgba(255,255,255,.04);}

    .links{
      text-align:center;margin-top:20px;
      font-size:13px;color:var(--text-secondary);
    }
    .links a{color:var(--gold);text-decoration:none;font-weight:500;}
    .links a:hover{text-decoration:underline;}

    .alert{
      padding:12px 16px;border-radius:10px;
      font-size:13px;margin-bottom:16px;display:none;
    }
    .alert-error{
      background:rgba(239,68,68,.12);color:var(--danger);
      border:1px solid rgba(239,68,68,.25);display:block;
    }
    .alert-success{
      background:rgba(34,197,94,.12);color:var(--success);
      border:1px solid rgba(34,197,94,.25);display:block;
    }

    .back-link{
      display:block;text-align:center;margin-top:24px;
      color:var(--text-secondary);text-decoration:none;
      font-size:13px;
    }
    .back-link:hover{color:var(--gold);}

    @media(max-width:480px){
      .card{padding:24px 20px;}
      .login-header .logo{font-size:20px;}
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="logo">Instituto Lumethos</div>
    <p>Entre para acessar seus cursos</p>
  </div>

  <div class="card">
    <div class="alert alert-error" id="errorAlert"></div>
    <div class="alert alert-success" id="successAlert"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="Sua senha" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">
        Entrar
      </button>
    </form>

    <div class="divider">ou continue com</div>

    <button class="social-btn" onclick="loginWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 01-1.8 2.72v2.26h2.92A8.78 8.78 0 0017.64 9.2z"/><path fill="#34A853" d="M9 18c2.48 0 4.56-.82 6.08-2.22l-2.92-2.26c-.8.54-1.84.86-3.16.86-2.44 0-4.5-1.64-5.24-3.86H.84v2.34A8.96 8.96 0 009 18z"/><path fill="#FBBC05" d="M3.76 10.52A5.52 5.52 0 013.46 9c0-.54.1-1.06.3-1.52V5.14H.84A8.96 8.96 0 000 9c0 1.46.34 2.84.84 4.06l2.92-2.54z"/><path fill="#EA4335" d="M9 3.48c1.34 0 2.54.46 3.48 1.36l2.6-2.6C13.54.98 11.46 0 9 0A8.96 8.96 0 00.84 5.14l2.92 2.54C4.5 5.12 6.56 3.48 9 3.48z"/></svg>
      Google
    </button>

    <div class="links" style="margin-top:20px;">
      <a href="#" onclick="showForgotPassword(event)">Esqueceu a senha?</a>
    </div>
  </div>

  <div class="links" style="margin-top:16px;">
    Não tem conta? <a href="#" onclick="showRegister(event)">Criar conta</a>
  </div>

  <a href="/" class="back-link">← Voltar para o site</a>
</div>

<!-- Supabase SDK -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
  const SUPABASE_URL = "https://xplqghmhslfpyyqhwvkp.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_sQPtweum0Qbml5zK3vd4Yg_tbdnxJ-o";
  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const errorAlert = document.getElementById('errorAlert');
  const successAlert = document.getElementById('successAlert');
  const loginBtn = document.getElementById('loginBtn');

  function showError(msg) {
    errorAlert.textContent = msg;
    errorAlert.style.display = 'block';
    successAlert.style.display = 'none';
  }

  function showSuccess(msg) {
    successAlert.textContent = msg;
    successAlert.style.display = 'block';
    errorAlert.style.display = 'none';
  }

  function hideAlerts() {
    errorAlert.style.display = 'none';
    successAlert.style.display = 'none';
  }

  // Check if already logged in
  async function checkSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      redirectAfterLogin();
    }
  }

  function redirectAfterLogin() {
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect') || '/aluno/dashboard.html';
    window.location.href = redirect;
  }

  // Login form
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideAlerts();
    loginBtn.disabled = true;
    loginBtn.textContent = 'Entrando...';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        if (error.message.includes('Invalid login')) {
          showError('E-mail ou senha incorretos');
        } else if (error.message.includes('Email not confirmed')) {
          showError('Confirme seu e-mail antes de entrar');
        } else {
          showError(error.message);
        }
        loginBtn.disabled = false;
        loginBtn.textContent = 'Entrar';
        return;
      }

      showSuccess('Login realizado! Redirecionando...');
      setTimeout(redirectAfterLogin, 800);
    } catch (err) {
      showError('Erro de conexão. Tente novamente.');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
    }
  });

  // Google OAuth
  async function loginWithGoogle() {
    hideAlerts();
    loginBtn.disabled = true;
    loginBtn.textContent = 'Redirecionando...';

    const { data, error } = await supabase.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + '/aluno/dashboard.html',
        queryParams: { access_type: 'offline', prompt: 'consent' }
      }
    });

    if (error) {
      showError('Erro ao iniciar login com Google');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
    }
  }

  // Register
  window.showRegister = async function(e) {
    e.preventDefault();
    const email = prompt('Digite seu e-mail para criar uma conta:');
    if (!email) return;

    hideAlerts();
    const password = prompt('Crie uma senha (mínimo 6 caracteres):');
    if (!password || password.length < 6) {
      showError('A senha precisa ter no mínimo 6 caracteres');
      return;
    }

    const name = prompt('Seu nome completo:');
    if (!name) return;

    loginBtn.disabled = true;
    loginBtn.textContent = 'Criando conta...';

    const { data, error } = await supabase.auth.signUp({
      email,
      password,
      options: {
        data: { full_name: name },
        emailRedirectTo: window.location.origin + '/aluno/dashboard.html'
      }
    });

    if (error) {
      showError(error.message);
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
      return;
    }

    if (data.user?.identities?.length === 0) {
      showError('Este e-mail já está cadastrado');
      loginBtn.disabled = false;
      loginBtn.textContent = 'Entrar';
      return;
    }

    showSuccess('Conta criada! Verifique seu e-mail para confirmar.');
    loginBtn.textContent = 'Entrar';
    loginBtn.disabled = false;
  };

  // Forgot password
  window.showForgotPassword = async function(e) {
    e.preventDefault();
    const email = prompt('Digite seu e-mail para redefinir a senha:');
    if (!email) return;

    hideAlerts();
    const { error } = await supabase.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/login.html?reset=true'
    });

    if (error) {
      showError(error.message);
      return;
    }

    showSuccess('E-mail de redefinição enviado! Verifique sua caixa de entrada.');
  };

  // Init
  checkSession();
</script>

</body>
</html>
