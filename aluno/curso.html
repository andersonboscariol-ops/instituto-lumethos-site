<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Curso · Instituto Lumethos</title>
  <link rel="icon" href="/img/favicon.ico">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap');

    :root {
      --navy: #0D1B2A; --navy-light: #152238; --navy-card: #1a2d45;
      --gold: #C79A2E; --gold-bright: #e0b84c;
      --gold-soft: rgba(199,154,46,.12);
      --white: #fff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-muted: rgba(255,255,255,0.42);
      --border: rgba(255,255,255,0.06);
      --border-hover: rgba(255,255,255,0.12);
      --sidebar-w: 320px;
      --lesson-bg: #fafbfc;
      --lesson-text: #1a1a2e;
      --lesson-text-mid: #555;
      --lesson-border: #e5e7eb;
      --lesson-card: #ffffff;
      --radius: 12px; --radius-sm: 8px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    body { font-family:'Inter',sans-serif; background:var(--navy); color:var(--white); min-height:100vh; }

    .topbar {
      position:fixed; top:0; left:0; right:0; z-index:200; height:52px;
      background:rgba(13,27,42,0.92); backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; gap:12px;
    }
    .topbar .back-section { display:flex; align-items:center; gap:10px; min-width:0; }
    .topbar .back-btn {
      width:32px; height:32px; border-radius:8px; border:1px solid var(--border-hover);
      background:none; color:var(--text-secondary); font-size:16px; cursor:pointer;
      transition:all var(--transition); display:flex; align-items:center; justify-content:center;
    }
    .topbar .back-btn:hover { border-color:var(--gold); color:var(--gold); }
    .topbar .topbar-title {
      font-size:13px; font-weight:500; color:var(--text-secondary);
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:300px;
    }
    .topbar .progress-pill {
      background:var(--gold-soft); color:var(--gold); font-size:11px;
      font-weight:700; padding:6px 14px; border-radius:50px; white-space:nowrap;
      border:1px solid rgba(199,154,46,.15);
    }
    .topbar .nav-home {
      color:var(--text-muted); text-decoration:none; font-size:14px;
      padding:4px 8px; transition:color var(--transition);
    }
    .topbar .nav-home:hover { color:var(--white); }

    .layout { display:flex; padding-top:52px; min-height:calc(100vh - 52px); }

    /* ===== SIDEBAR ===== */
    .sidebar {
      width:var(--sidebar-w); min-width:var(--sidebar-w);
      background:var(--navy-light); border-right:1px solid var(--border);
      overflow-y:auto; height:calc(100vh - 52px);
      position:sticky; top:52px; padding:8px 0;
    }
    .sidebar .module-group {
      margin:0 10px 4px; border-radius:var(--radius-sm);
      overflow:hidden; border:1px solid transparent; transition:all var(--transition);
    }
    .sidebar .module-group.open { border-color:var(--border); background:rgba(255,255,255,.01); }
    .sidebar .module-header {
      display:flex; align-items:center; justify-content:space-between;
      padding:13px 16px; cursor:pointer; user-select:none;
      transition:background var(--transition); border-radius:var(--radius-sm);
    }
    .sidebar .module-header:hover { background:rgba(255,255,255,.03); }
    .sidebar .module-title {
      font-size:13px; font-weight:600; display:flex; align-items:center; gap:10px;
    }
    .sidebar .module-num {
      width:24px; height:24px; border-radius:6px;
      background:var(--gold-soft); color:var(--gold);
      font-size:11px; font-weight:700; display:flex; align-items:center;
      justify-content:center; flex-shrink:0;
    }
    .sidebar .module-group.open .module-num { background:var(--gold); color:var(--navy); }
    .sidebar .module-meta {
      display:flex; align-items:center; gap:10px; font-size:11px; color:var(--text-muted);
    }
    .sidebar .module-arrow {
      font-size:9px; color:var(--text-muted); transition:transform 0.25s ease;
    }
    .sidebar .module-group.open .module-arrow { transform:rotate(90deg); color:var(--gold); }
    .sidebar .lesson-list { display:none; padding:0 0 8px; }
    .sidebar .module-group.open .lesson-list { display:block; }
    .sidebar .lesson-item {
      display:flex; align-items:center; gap:12px;
      padding:10px 16px 10px 48px; cursor:pointer;
      font-size:12px; color:var(--text-secondary);
      transition:all var(--transition); border-left:2px solid transparent;
      position:relative;
    }
    .sidebar .lesson-item:hover { background:rgba(255,255,255,.03); color:var(--white); }
    .sidebar .lesson-item.active {
      background:var(--gold-soft); border-left-color:var(--gold);
      color:var(--gold); font-weight:600;
    }
    .sidebar .lesson-item.completed { color:#4ade80; }
    .sidebar .lesson-icon {
      width:20px; height:20px; border-radius:50%; flex-shrink:0;
      border:2px solid rgba(255,255,255,.15);
      display:flex; align-items:center; justify-content:center;
      font-size:9px;
    }
    .sidebar .lesson-item.completed .lesson-icon {
      border-color:#4ade80; background:#4ade80; color:var(--navy); font-weight:700;
    }
    .sidebar .lesson-item.active .lesson-icon {
      border-color:var(--gold);
    }

    /* ===== MAIN CONTENT ===== */
    .main-content {
      flex:1; overflow-y:auto; height:calc(100vh - 52px);
      background:var(--lesson-bg);
    }
    .lesson-container {
      max-width:860px; margin:0 auto; padding:36px 44px 80px;
      color:var(--lesson-text);
    }
    .lesson-container h1 {
      font-family:'Libre Baskerville',serif;
      font-size:30px; color:var(--lesson-text); margin-bottom:10px;
      line-height:1.35; letter-spacing:-.3px;
    }
    .lesson-meta {
      display:flex; gap:18px; align-items:center; margin-bottom:28px;
      font-size:13px; color:var(--lesson-text-mid); flex-wrap:wrap;
    }
    .lesson-meta span { display:flex; align-items:center; gap:5px; }
    .lesson-meta .meta-tag {
      padding:4px 12px; border-radius:50px; font-size:11px; font-weight:500;
    }
    .meta-tag.free { background:rgba(34,197,94,.1); color:#16a34a; }
    .meta-tag.video { background:rgba(199,154,46,.1); color:var(--gold); }

    .video-wrapper {
      aspect-ratio:16/9; background:#e8eaed;
      border-radius:var(--radius); overflow:hidden; margin-bottom:32px;
      border:1px solid var(--lesson-border); box-shadow:0 2px 16px rgba(0,0,0,.06);
    }
    .video-wrapper iframe { width:100%; height:100%; border:none; }
    .video-wrapper .no-video {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; height:100%; color:#999;
    }
    .video-wrapper .no-video span { font-size:52px; margin-bottom:10px; }

    .lesson-body {
      font-size:15px; line-height:1.85; color:var(--lesson-text); max-width:720px;
    }
    .lesson-body h2 {
      font-family:'Libre Baskerville',serif; font-size:22px;
      color:var(--lesson-text); margin:36px 0 14px; letter-spacing:-.2px;
    }
    .lesson-body h3 {
      font-size:17px; color:var(--lesson-text); margin:24px 0 10px; font-weight:600;
    }
    .lesson-body p { margin-bottom:16px; color:var(--lesson-text-mid); }
    .lesson-body ul, .lesson-body ol { margin:10px 0 20px 22px; color:var(--lesson-text-mid); }
    .lesson-body li { margin-bottom:8px; }
    .lesson-body blockquote {
      border-left:4px solid var(--gold); padding:14px 20px;
      margin:20px 0; background:rgba(199,154,46,.04);
      border-radius:0 var(--radius-sm) var(--radius-sm) 0;
      font-style:italic; color:var(--lesson-text-mid);
    }
    .lesson-body strong { color:var(--lesson-text); }

    /* Quiz */
    .quiz-section {
      margin-top:40px; padding:28px; border-radius:var(--radius);
      background:var(--lesson-card); border:1px solid var(--lesson-border);
      box-shadow:0 2px 12px rgba(0,0,0,.04);
    }
    .quiz-section h3 {
      font-family:'Libre Baskerville',serif;
      font-size:20px; color:var(--lesson-text); margin-bottom:20px;
    }
    .quiz-question { margin-bottom:22px; }
    .quiz-question .q-text {
      font-weight:600; color:var(--lesson-text); margin-bottom:10px; font-size:14px;
    }
    .quiz-option {
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border-radius:var(--radius-sm); cursor:pointer;
      border:2px solid var(--lesson-border); margin-bottom:6px;
      transition:all var(--transition); color:var(--lesson-text); font-size:14px;
    }
    .quiz-option:hover { border-color:#ccc; background:#f9fafb; }
    .quiz-option.selected { border-color:var(--gold); background:rgba(199,154,46,.04); }
    .quiz-option.correct { border-color:#4ade80; background:rgba(34,197,94,.06); }
    .quiz-option.wrong { border-color:#ef4444; background:rgba(239,68,68,.04); }
    .quiz-submit {
      padding:12px 32px; background:var(--gold); color:var(--white);
      border:none; border-radius:50px; font-weight:600; cursor:pointer;
      font-size:14px; margin-top:16px; transition:all var(--transition);
      font-family:'Inter',sans-serif;
    }
    .quiz-submit:hover { background:var(--gold-bright); transform:translateY(-1px); }
    .quiz-submit:disabled { opacity:.5; cursor:not-allowed; }
    .quiz-result { font-weight:600; margin-top:10px; font-size:14px; }

    .lesson-nav {
      display:flex; justify-content:space-between; margin-top:48px;
      padding-top:24px; border-top:1px solid var(--lesson-border); gap:12px;
    }
    .lesson-nav button, .lesson-nav a {
      padding:12px 22px; border-radius:50px; font-weight:600;
      font-size:13px; cursor:pointer; transition:all var(--transition);
      border:none; font-family:'Inter',sans-serif; text-decoration:none; display:inline-block;
    }
    .nav-prev { background:var(--lesson-border); color:var(--lesson-text-mid); }
    .nav-prev:hover { background:#d1d5db; }
    .nav-next { background:var(--gold); color:var(--white); }
    .nav-next:hover { background:var(--gold-bright); transform:translateX(2px); }

    .complete-btn {
      padding:12px 28px; background:#4ade80; color:var(--white);
      border:none; border-radius:50px; font-weight:600; cursor:pointer;
      font-size:14px; transition:all var(--transition);
      font-family:'Inter',sans-serif;
    }
    .complete-btn:hover { background:#22c55e; transform:translateY(-1px); }
    .complete-btn.done { background:#d1d5db; color:#666; cursor:default; }

    .state-empty { text-align:center; padding:80px 20px; color:#999; }
    .state-empty .icon { font-size:48px; margin-bottom:12px; }
    .state-empty a { color:var(--gold); text-decoration:underline; }

    @media(max-width:768px) {
      .layout { flex-direction:column; }
      .sidebar { width:100%; min-width:100%; height:auto; position:relative; top:auto; border-right:none; border-bottom:1px solid var(--border); max-height:40vh; }
      .main-content { height:auto; min-height:60vh; }
      .lesson-container { padding:20px 16px 48px; }
      .lesson-container h1 { font-size:22px; }
    }
  </style>
</head>
<body>

<nav class="topbar">
  <div class="back-section">
    <button class="back-btn" onclick="window.location='/aluno/dashboard.html'">←</button>
    <span class="topbar-title" id="topbarTitle">Carregando...</span>
  </div>
  <span class="progress-pill" id="progressPill">0%</span>
  <a href="/aluno/dashboard.html" class="nav-home">◆</a>
</nav>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div style="padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px;">Carregando...</div>
  </aside>

  <main class="main-content" id="mainContent">
    <div class="lesson-container">
      <div class="state-empty"><div class="icon">◆</div><p>Carregando curso...</p></div>
    </div>
  </main>
</div>

<script>
  const API = '/api';
  function getToken(){ return localStorage.getItem('lumethos_token'); }
  function getUser(){ return JSON.parse(localStorage.getItem('lumethos_user')||'null'); }
  function h(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }

  let courseSlug = null;
  let modules = [];
  let completedLessons = new Set();
  let user = null;

  function getCourseSlug(){ return new URLSearchParams(location.search).get('slug'); }

  async function apiGet(url){
    const r = await fetch(url,{headers:h()});
    if(!r.ok) throw new Error('API error '+r.status);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    return data;
  }

  async function apiPost(url,body){
    const r = await fetch(url,{method:'POST',headers:h(),body:JSON.stringify(body)});
    if(!r.ok) throw new Error('API error '+r.status);
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    return data;
  }

  async function init(){
    try {
      const userData = await apiGet(API+'/auth/me');
      user = userData;
    } catch(e){
      window.location.href = '/login.html?redirect='+encodeURIComponent(location.pathname+location.search);
      return;
    }

    courseSlug = getCourseSlug();
    if(!courseSlug){
      document.getElementById('mainContent').innerHTML='<div class="lesson-container"><div class="state-empty"><div class="icon">⚠</div><p>Curso não especificado</p><a href="/biblioteca.html">Ver biblioteca</a></div></div>';
      return;
    }

    let course;
    try{
      course = await apiGet(API+'/courses/'+courseSlug);
    } catch(e){
      document.getElementById('mainContent').innerHTML='<div class="lesson-container"><div class="state-empty"><div class="icon">◈</div><p>Curso não encontrado</p><a href="/biblioteca.html">Ver biblioteca</a></div></div>';
      return;
    }

    document.getElementById('topbarTitle').textContent = course.title;
    document.title = course.title + ' · Lumethos';

    modules = (course.modules||[]).map(m=>({
      id:m.id, title:m.title, position:m.order_num,
      lessons:(m.lessons||[]).sort((a,b)=>(a.order_num||0)-(b.order_num||0))
    }));

    if(modules.length===0){
      document.getElementById('sidebar').innerHTML='<div style="padding:24px 16px;text-align:center;color:var(--text-muted);font-size:13px;">Sem módulos</div>';
      document.getElementById('mainContent').innerHTML='<div class="lesson-container"><div class="state-empty"><div class="icon">◇</div><p>Este curso ainda não tem conteúdo</p></div></div>';
      return;
    }

    try{
      const progress = await apiGet(API+'/courses/'+courseSlug+'/progress');
    } catch(e){}

    renderSidebar();
    openModule(modules[0].id);
    loadLesson(modules[0].lessons[0]);
    updateProgress();
  }

  function renderSidebar(){
    document.getElementById('sidebar').innerHTML = modules.map((m,i) => {
      const done = m.lessons.filter(l => completedLessons.has(l.id)).length;
      return `<div class="module-group" id="mod-${m.id}">
        <div class="module-header" onclick="toggleModule('${m.id}')">
          <span class="module-title"><span class="module-num">${i+1}</span>${m.title}</span>
          <span class="module-meta">
            <span>${done}/${m.lessons.length}</span>
            <span class="module-arrow">▶</span>
          </span>
        </div>
        <div class="lesson-list">${m.lessons.map(l => `
          <div class="lesson-item${completedLessons.has(l.id)?' completed':''}" id="les-${l.id}" onclick="loadLessonById('${l.id}')">
            <span class="lesson-icon">${completedLessons.has(l.id)?'✓':''}</span>
            ${l.title}
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  function toggleModule(id){ document.getElementById('mod-'+id)?.classList.toggle('open'); }
  function openModule(id){ document.getElementById('mod-'+id)?.classList.add('open'); }

  function loadLessonById(id){
    for(const m of modules){
      const l = m.lessons.find(ls => ls.id===id);
      if(l){ openModule(m.id); loadLesson(l); return; }
    }
  }

  async function loadLesson(lesson){
    document.querySelectorAll('.lesson-item').forEach(el => el.classList.remove('active'));
    document.getElementById('les-'+lesson.id)?.classList.add('active');

    let lessonDetail;
    try{
      lessonDetail = await apiGet(API+'/lessons/'+lesson.id);
    } catch(e){ lessonDetail = lesson; }

    if(lessonDetail.completed){
      completedLessons.add(lesson.id);
      document.getElementById('les-'+lesson.id)?.classList.add('completed');
    }

    const typeIcons = { video:'▶', text:'☰', quiz:'✎', pdf:'⬡' };
    const isDone = completedLessons.has(lesson.id);
    const isVideo = lessonDetail.content_type === 'video';
    const isQuiz = lessonDetail.content_type === 'quiz';

    let videoHTML = '';
    if(lessonDetail.video_url){
      const embed = getEmbedUrl(lessonDetail.video_url);
      videoHTML = `<div class="video-wrapper"><iframe src="${embed}" allowfullscreen></iframe></div>`;
    } else if(isVideo){
      videoHTML = `<div class="video-wrapper"><div class="no-video"><span>▶</span><p>Vídeo em breve</p></div></div>`;
    }

    let bodyHTML = '';
    if(lessonDetail.content){
      bodyHTML = `<div class="lesson-body">${formatContent(lessonDetail.content)}</div>`;
    }

    const prev = lessonDetail.prev || null;
    const next = lessonDetail.next || null;

    document.getElementById('mainContent').innerHTML = `
      <div class="lesson-container">
        <h1>${lesson.title}</h1>
        <div class="lesson-meta">
          ${isVideo ? '<span class="meta-tag video">▶ Vídeo</span>' : isQuiz ? '<span class="meta-tag video">?" Quiz</span>' : '<span>☰ Leitura</span>'}
          ${lessonDetail.duration_min ? `<span>⏱ ${lessonDetail.duration_min} min</span>` : ''}
          ${lesson.is_free ? '<span class="meta-tag free">✦ Grátis</span>' : ''}
        </div>
        ${videoHTML}
        ${bodyHTML}

        <div style="margin-top:40px;display:flex;align-items:center;gap:16px;">
          <button class="complete-btn${isDone?' done':''}" onclick="markComplete('${lesson.id}')" id="completeBtn">
            ${isDone?'✓ Concluída':'Marcar como concluída'}
          </button>
          ${!isDone ? '<span style="font-size:12px;color:var(--lesson-text-mid);">Marque após finalizar a aula</span>' : ''}
        </div>

        <div class="quiz-section" id="quizSection" style="display:${isQuiz?'block':'none'}">
          <h3>📝 Quiz</h3>
          <p style="color:var(--lesson-text-mid);font-size:14px;">Carregando questões...</p>
        </div>

        <div class="lesson-nav">
          <span>${prev ? `<a href="javascript:void(0)" class="nav-prev" onclick="loadLessonById('${prev.id}')">← ${prev.title}</a>` : ''}</span>
          <span>${next ? `<a href="javascript:void(0)" class="nav-next" onclick="loadLessonById('${next.id}')">${next.title} →</a>` : ''}</span>
        </div>
      </div>`;

    document.getElementById('mainContent').scrollTop = 0;

    if(isQuiz) loadQuiz(lesson.id);
    renderSidebar();
    updateProgress();
  }

  async function loadQuiz(lessonId){
    const qs = document.getElementById('quizSection');
    if(!qs) return;

    let quizData;
    try{
      quizData = await apiGet(API+'/quiz/'+lessonId);
    } catch(e){
      qs.innerHTML='<h3>📝 Quiz</h3><p style="color:var(--lesson-text-mid);font-size:14px;">Nenhuma questão disponível</p>';
      return;
    }

    const questions = quizData.questions||[];
    const attempts = quizData.attempts||[];

    if(questions.length===0){
      qs.innerHTML='<h3>📝 Quiz</h3><p style="color:var(--lesson-text-mid);font-size:14px;">Nenhuma questão disponível</p>';
      return;
    }

    const passedAttempt = attempts.find(a=>a.passed);
    if(passedAttempt){
      qs.innerHTML=`<h3>📝 Quiz</h3>
        <div style="display:flex;align-items:center;gap:12px;">
          <div style="width:48px;height:48px;border-radius:50%;background:rgba(34,197,94,.1);display:flex;align-items:center;justify-content:center;font-size:20px;">✓</div>
          <div>
            <p style="font-weight:600;color:#16a34a;font-size:15px;">Quiz concluído!</p>
            <p style="color:var(--lesson-text-mid);font-size:13px;">Nota: ${passedAttempt.score}%</p>
          </div>
        </div>`;
      return;
    }

    qs.innerHTML=`<h3>📝 Quiz</h3><form id="quizForm">
      ${questions.map((q,qi)=>`<div class="quiz-question">
        <div class="q-text">${qi+1}. ${q.question}</div>
        ${(q.options||[]).map((opt,oi)=>`
          <label class="quiz-option"><input type="radio" name="q_${q.id}" value="${oi}"> ${opt}</label>
        `).join('')}
      </div>`).join('')}
      <button type="submit" class="quiz-submit">Verificar respostas</button>
    </form><div class="quiz-result" id="quizResult"></div>`;

    document.getElementById('quizForm').addEventListener('submit',async e=>{
      e.preventDefault();
      const answers={};
      questions.forEach(q=>{
        const sel=document.querySelector(`input[name="q_${q.id}"]:checked`);
        if(sel) answers[q.id]=parseInt(sel.value);
      });

      const submitBtn=document.querySelector('.quiz-submit');
      submitBtn.disabled=true; submitBtn.textContent='Enviando...';

      let result;
      try{
        result=await apiPost(API+'/quiz/'+quizData.id+'/submit',{answers});
      } catch(err){
        document.getElementById('quizResult').textContent='Erro ao enviar: '+err.message;
        document.getElementById('quizResult').style.color='#ef4444';
        submitBtn.disabled=false; submitBtn.textContent='Verificar respostas';
        return;
      }

      const score=result.score;

      if(result.results){
        result.results.forEach(r=>{
          const qi=questions.findIndex(q=>q.id===r.question_id);
          if(qi===-1) return;
          const q=questions[qi];
          const options=document.querySelectorAll(`input[name="q_${q.id}"]`);
          const correctOption=options[r.correct_index];
          if(correctOption) correctOption.closest('.quiz-option').classList.add('correct');
          if(r.user_index!==undefined && r.user_index!==r.correct_index){
            const userOption=options[r.user_index];
            if(userOption) userOption.closest('.quiz-option').classList.add('wrong');
          }
        });
      }

      document.getElementById('quizResult').innerHTML=`
        <div style="display:flex;align-items:center;gap:12px;margin-top:8px;">
          <div style="width:40px;height:40px;border-radius:50%;background:${score>=(quizData.passing_score||60)?'rgba(34,197,94,.1)':'rgba(239,68,68,.1)'};display:flex;align-items:center;justify-content:center;font-weight:700;color:${score>=(quizData.passing_score||60)?'#16a34a':'#ef4444'};">
            ${score}%
          </div>
          <span style="color:${score>=(quizData.passing_score||60)?'#16a34a':'#ef4444'};font-weight:600;">
            ${result.correct}/${result.total} corretas${score>=(quizData.passing_score||60)?' — Aprovado!':' — Tente novamente'}
          </span>
        </div>`;

      document.querySelectorAll('#quizForm input').forEach(i=>i.disabled=true);
      submitBtn.disabled=true; submitBtn.textContent='Verificar respostas';

      if(result.passed){
        completedLessons.add(lessonId);
        const btn=document.getElementById('completeBtn');
        if(btn){ btn.textContent='✓ Concluída'; btn.classList.add('done'); }
        renderSidebar(); updateProgress();
      }
    });
  }

  async function markComplete(lessonId){
    if(completedLessons.has(lessonId)) return;
    await apiPost(API+'/lessons/'+lessonId+'/complete');
    completedLessons.add(lessonId);
    const btn=document.getElementById('completeBtn');
    if(btn){ btn.textContent='✓ Concluída'; btn.classList.add('done'); }
    renderSidebar(); updateProgress();
  }

  function updateProgress(){
    const all=modules.flatMap(m=>m.lessons);
    const done=all.filter(l=>completedLessons.has(l.id)).length;
    const pct=all.length?Math.round((done/all.length)*100):0;
    document.getElementById('progressPill').textContent=pct+'%';
  }

  function getEmbedUrl(url){
    if(!url) return '';
    const yt=url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([\w-]+)/);
    if(yt) return `https://www.youtube.com/embed/${yt[1]}`;
    const vm=url.match(/vimeo\.com\/(\d+)/);
    if(vm) return `https://player.vimeo.com/video/${vm[1]}`;
    return url;
  }

  function formatContent(body){
    if(!body) return '';
    return body.split('\n\n').map(block=>{
      block=block.trim();
      if(!block) return '';
      if(block.startsWith('## ')) return `<h2>${block.slice(3)}</h2>`;
      if(block.startsWith('### ')) return `<h3>${block.slice(4)}</h3>`;
      if(block.startsWith('- ')) return '<ul>'+block.split('\n').filter(l=>l.startsWith('- ')).map(l=>`<li>${l.slice(2)}</li>`).join('')+'</ul>';
      if(block.startsWith('> ')) return `<blockquote>${block.split('\n').map(l=>l.replace(/^> /,'')).join('<br>')}</blockquote>`;
      return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    }).join('');
  }

  init();
</script>
</body>
</html>
