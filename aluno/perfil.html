<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Perfil · Instituto Lumethos</title>
  <link rel="icon" href="../img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg-deep: #080e1a; --bg-primary: #0b1424;
      --bg-secondary: #101b30; --bg-card: #151f38;
      --bg-card-hover: #1a2745;
      --gold: #C79A2E; --gold-bright: #e0b84c;
      --gold-glow: rgba(199,154,46,0.18); --gold-soft: rgba(199,154,46,0.10);
      --white: #E2E8F0; --text-primary: #e8edf2;
      --text-secondary: rgba(232,237,242,0.68); --text-muted: rgba(232,237,242,0.38);
      --border: rgba(255,255,255,0.05); --border-hover: rgba(255,255,255,0.10);
      --radius: 16px; --radius-sm: 10px; --radius-xs: 8px;
      --sidebar-w: 248px; --sidebar-collapsed-w: 56px; --topbar-h: 40px;
      --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
      --green: #22c55e; --red: #ef4444; --rose: #0D1B2A;
      --blue: #3b82f6; --purple: #8b5cf6;
    }

    body {
      font-family: 'Inter', sans-serif; background: var(--bg-deep);
      color: var(--text-primary); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════ TOPBAR ═══════════ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--topbar-h);
      background: rgba(9,16,30,0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid rgba(199,154,46,0.18);
      box-shadow: 0 1px 30px rgba(199,154,46,0.08), 0 -1px 0 rgba(199,154,46,0.04) inset;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .topbar-left { display: flex; align-items: center; }
    .sidebar-toggle-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(199,154,46,0.06); border: 1px solid rgba(199,154,46,0.12);
      color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.3s; flex-shrink: 0;
    }
    .sidebar-toggle-btn:hover { background: rgba(199,154,46,0.14); border-color: var(--gold); box-shadow: 0 0 14px rgba(199,154,46,0.18); }
    .sidebar-toggle-btn .ico { transition: transform 0.3s; display: inline-block; }
    .sidebar.collapsed ~ .layout .sidebar-toggle-btn .ico { transform: rotate(180deg); }
    .topbar-right { display: flex; align-items: center; gap: 16px; }
    .topbar-user-name { font-size: 13px; color: var(--text-secondary); font-weight: 500; }
    .topbar-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #d4a843);
      color: var(--bg-primary); display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; box-shadow: 0 2px 12px rgba(199,154,46,0.25);
    }
    .topbar-btn {
      background: none; border: 1px solid var(--border-hover);
      color: var(--text-muted); padding: 6px 14px; border-radius: 50px;
      font-size: 12px; cursor: pointer; transition: all var(--transition);
      font-family: 'Inter', sans-serif; font-weight: 500;
    }
    .topbar-btn:hover { color: #f87171; border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.06); }

    /* ═══════════ LAYOUT ═══════════ */
    .layout { display: flex; padding-top: var(--topbar-h); min-height: 100vh; }

    /* ═══════════ SIDEBAR - PREMIUM GLASS ═══════════ */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: linear-gradient(180deg, rgba(13,23,38,0.75) 0%, rgba(9,16,30,0.85) 100%);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-right: 1px solid rgba(199,154,46,0.12);
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      overflow-y: auto; overflow-x: hidden; z-index: 100;
      padding: 0;
      display: flex; flex-direction: column;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    /* Collapsed */
    .sidebar.collapsed {
      width: var(--sidebar-collapsed-w); min-width: var(--sidebar-collapsed-w);
    }
    .sidebar.collapsed .sidebar-brand,
    .sidebar.collapsed .sidebar-user,
    .sidebar.collapsed .sidebar-stats,
    .sidebar.collapsed .sidebar-divider,
    .sidebar.collapsed .sidebar-footer,
    .sidebar.collapsed .sidebar-link .link-label,
    .sidebar.collapsed .sidebar-link .badge,
    .sidebar.collapsed .section-label { display: none; }
    .sidebar.collapsed .sidebar-link { justify-content: center; padding: 10px 0; margin: 2px 8px; border-radius: 10px; }
    .sidebar.collapsed .sidebar-link .icon { font-size: 18px; width: auto; margin: 0; }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(199,154,46,0.15); border-radius: 20px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    /* ── Brand ── */
    .sidebar-brand {
      padding: 12px 8px 4px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(199,154,46,0.08);
      margin: 0 10px;
    }
    .sidebar-brand-logo {
      height: 90px; width: auto;
      filter: brightness(1.2) drop-shadow(0 0 16px rgba(199,154,46,0.28));
      transition: filter 0.3s;
    }
    .sidebar-brand-logo:hover { filter: brightness(1.4) drop-shadow(0 0 24px rgba(199,154,46,0.40)); }

    .sidebar-user {
      padding: 18px 14px; margin: 12px 8px 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(199,154,46,0.06) 0%, rgba(13,27,42,0.3) 100%);
      border: 1px solid rgba(199,154,46,0.12);
      position: relative; overflow: visible;
    }
    .sidebar-user::after {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(199,154,46,0.25), transparent);
    }
    .sidebar-user-top { display: flex; align-items: center; gap: 12px; }
    .sidebar-user-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 19px; color: #fff;
      box-shadow: 0 0 18px rgba(199,154,46,0.25);
      flex-shrink: 0;
    }
    .sidebar-user-info { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-user-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1;
    }
    .sidebar-user-role {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: var(--gold); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(199,154,46,0.08); display: inline-block;
      border: 1px solid rgba(199,154,46,0.2);
      line-height: 1;
    }

    .sidebar-stats {
      display: flex; gap: 6px; padding: 12px 10px; margin: 8px 8px 0;
    }
    .sidebar-stat {
      flex: 1; text-align: center; padding: 8px 4px;
      border-radius: var(--radius-xs);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(199,154,46,0.08);
      transition: all var(--transition);
    }
    .sidebar-stat:hover { border-color: rgba(199,154,46,0.20); background: rgba(199,154,46,0.04); }
    .sidebar-stat-value {
      font-size: 15px; font-weight: 800; color: var(--gold-light);
      font-family: 'Cinzel', serif; line-height: 1;
    }
    .sidebar-stat-label {
      font-size: 8px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.8px; margin-top: 3px; font-family: 'Inter', sans-serif;
    }

    .sidebar-divider {
      margin: 10px 16px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(199,154,46,0.12), transparent);
    }

    .sidebar-section { padding: 0 10px; margin-bottom: 6px; }
    .sidebar-section .section-label {
      font-size: 8px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); padding: 0 12px; margin-bottom: 8px;
      font-weight: 700; font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); opacity: 0.4;
    }

    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      color: var(--text-dim); text-decoration: none;
      font-size: 12.5px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      font-weight: 500; margin-bottom: 1px;
      position: relative; overflow: hidden;
    }
    .sidebar-link::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(199,154,46,0), rgba(199,154,46,0.06));
      opacity: 0; transition: opacity 0.3s ease;
    }
    .sidebar-link .icon {
      font-size: 17px; width: 22px; text-align: center; flex-shrink: 0;
      transition: all 0.3s ease; position: relative; z-index: 1;
    }
    .sidebar-link .label { position: relative; z-index: 1; }
    .sidebar-link .badge {
      margin-left: auto; padding: 2px 7px; border-radius: 5px;
      font-size: 8px; font-weight: 700; letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace; position: relative; z-index: 1;
      background: rgba(199,154,46,0.10); color: var(--gold-light);
    }

    .sidebar-link:hover { background: rgba(199,154,46,0.06); color: var(--gold-light); }
    .sidebar-link:hover::after { opacity: 1; }
    .sidebar-link:hover .icon { transform: translateX(3px); }
    .sidebar-link:hover .badge { background: rgba(199,154,46,0.18); }

    .sidebar-link.active {
      background: linear-gradient(90deg, rgba(199,154,46,0.08) 0%, rgba(199,154,46,0.02) 100%);
      color: var(--gold-light);
      border-left: 2px solid var(--gold);
      padding-left: 10px;
      box-shadow: inset 0 0 20px rgba(199,154,46,0.04);
    }
    .sidebar-link.active .badge { background: rgba(199,154,46,0.20); color: var(--gold-light); }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 8px 16px; margin: 0 8px 10px;
      border-top: 1px solid rgba(199,154,46,0.06);
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-footer-version {
      font-size: 10px; color: var(--text-dim);
      font-family: 'Inter', sans-serif; opacity: 0.45;
      letter-spacing: 0.3px; font-weight: 400;
    }

    /* ═══════════ MAIN ═══════════ */
    .main-content {
      flex: 1; margin-left: var(--sidebar-w);
      padding: 28px 32px 60px;
      max-width: calc(100% - var(--sidebar-w));
      transition: margin-left 0.35s cubic-bezier(0.4,0,0.2,1), max-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.collapsed ~ .main-content {
      margin-left: var(--sidebar-collapsed-w);
      max-width: calc(100% - var(--sidebar-collapsed-w));
    }
    .page-title h1 {
      font-family: 'Cinzel', serif; font-size: 28px; margin-bottom: 4px;
    }
    .page-title p { color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

    /* Cards */
    .card {
      background: var(--glass-bg); border-radius: var(--radius);
      border: 1px solid var(--border); padding: 28px; margin-bottom: 18px;
      transition: border-color var(--transition);
    }
    .card:hover { border-color: var(--border-hover); }
    .card h3 {
      font-size: 13px; font-weight: 600; margin-bottom: 16px;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.6px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h3::before {
      content: ''; width: 4px; height: 14px; border-radius: 2px;
      background: var(--gold); display: inline-block;
    }

    .form-group { margin-bottom: 15px; }
    .form-group label {
      font-size: 12px; font-weight: 500; color: var(--text-muted);
      display: block; margin-bottom: 5px;
    }
    .form-group input, .form-group textarea {
      width: 100%; padding: 11px 14px; background: var(--bg-secondary);
      border: 1px solid var(--border); border-radius: var(--radius-xs);
      color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: all var(--transition);
    }
    .form-group input:focus, .form-group textarea:focus {
      border-color: var(--gold); box-shadow: 0 0 0 3px rgba(199,154,46,0.08);
    }
    .form-group input:disabled { opacity: 0.35; cursor: not-allowed; }
    .form-group textarea { min-height: 80px; resize: vertical; }

    .avatar-section { display: flex; align-items: center; justify-content: space-between; gap: 24px; margin-bottom: 20px; }
    .avatar-circle {
      width: 80px; height: 80px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold-bright));
      background-size: cover; background-position: center;
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; font-weight: 700; color: var(--bg-primary);
      flex-shrink: 0; box-shadow: 0 4px 20px rgba(199,154,46,0.25);
      transition: transform var(--transition);
      cursor: pointer; position: relative; overflow: hidden;
    }
    .avatar-circle:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(199,154,46,0.45); }
    .avatar-circle.has-photo { color: transparent; }
    .avatar-circle .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity var(--transition);
    }
    .avatar-circle:hover .avatar-overlay { opacity: 1; }
    .avatar-overlay-text { color: #fff; font-size: 11px; font-weight: 600; }
    .photo-actions { display: flex; gap: 8px; margin-top: 8px; }
    .btn-photo { font-size: 11px; padding: 5px 12px; border-radius: 50px; cursor: pointer;
      border: 1px solid rgba(199,154,46,0.20); background: transparent; color: var(--text-dim);
      transition: all var(--transition); }
    .btn-photo:hover { border-color: var(--gold); color: var(--gold); }
    .btn-photo.remove:hover { border-color: #ef4444; color: #ef4444; }
    .avatar-info { font-size: 12px; color: var(--text-muted); text-align: right; flex: 1; }
    .avatar-info strong { color: var(--text-primary); font-size: 14px; display: block; margin-bottom: 2px; }

    /* MIRC badge */
    .mirc-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
    }
    .mirc-badge.active { background: rgba(34,197,94,0.10); color: #4ade80; border: 1px solid rgba(34,197,94,0.15); }
    .mirc-badge.expired { background: rgba(239,68,68,0.10); color: #f87171; border: 1px solid rgba(239,68,68,0.15); }
    .mirc-badge.pending { background: rgba(199,154,46,0.10); color: var(--gold); border: 1px solid rgba(199,154,46,0.15); }

    /* Buttons */
    .btn-primary {
      padding: 12px 28px; background: var(--gold); color: #0a1420;
      border: none; border-radius: 50px; font-weight: 700; font-size: 14px;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all var(--transition); box-shadow: 0 2px 12px rgba(199,154,46,0.2);
    }
    .btn-primary:hover {
      background: var(--gold-bright); transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(199,154,46,0.35);
    }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-outline {
      padding: 10px 22px; background: transparent; color: var(--text-secondary);
      border: 1px solid var(--border-hover); border-radius: 50px; font-size: 13px;
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all var(--transition); text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    /* Pills */
    .stats-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-pill {
      padding: 10px 18px; background: var(--gold-soft);
      border: 1px solid rgba(199,154,46,0.15); border-radius: 50px;
      font-size: 12px; color: var(--gold); font-weight: 500;
      transition: all var(--transition);
    }
    .stat-pill:hover { background: var(--gold-glow); border-color: rgba(199,154,46,0.25); }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      padding: 12px 24px; border-radius: 50px; font-size: 13px;
      background: rgba(34,197,94,0.92); color: #fff; z-index: 300;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      font-weight: 500;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: rgba(239,68,68,0.92); }

    /* Info row */
    .info-row {
      display: flex; justify-content: space-between; padding: 5px 0;
      font-size: 13px; border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .info-key { color: var(--text-muted); }
    .info-row .info-val { font-weight: 500; font-family: monospace; color: var(--text-secondary); }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-in { animation: fadeInUp 0.4s ease forwards; opacity: 0; }
    .anim-d1 { animation-delay: 0.05s; }
    .anim-d2 { animation-delay: 0.12s; }

    @media(max-width:768px) {
      .sidebar { width: 100%; min-width: 100%; position: relative; top: auto; bottom: auto; height: auto; border-right: none; border-bottom: 1px solid rgba(199,154,46,0.12); padding: 6px 0; flex-direction: row; overflow-x: auto; background: rgba(13,23,38,0.75); }
      .sidebar-brand { display: none; }
      .sidebar-user, .sidebar-stats, .sidebar-divider, .sidebar-footer { display: none; }
      .sidebar-section { padding: 0 3px; margin: 0; display: flex; }
      .sidebar-section .section-label { display: none; }
      .sidebar-link { white-space: nowrap; font-size: 10px; padding: 6px 8px; margin: 0 1px; border-radius: 6px; }
      .sidebar-link .icon { font-size: 13px; width: auto; }
      .sidebar-link .badge { display: none; }
      .sidebar-link.active { border-left: none; padding-left: 8px; }
      .topbar-logo { display: inline-block; height: 28px; filter: brightness(1.05) drop-shadow(0 0 6px rgba(199,154,46,0.15)); }
      .sidebar-link::after { display: none; }
      .layout { flex-direction: column; }
      .main-content { margin-left: 0; max-width: 100%; padding: 20px 16px; }
      .sidebar-section { padding: 0 6px; margin: 0; }
      .sidebar-section .section-label { display: none; }
      .sidebar-section .sidebar-link { white-space: nowrap; font-size: 11px; padding: 8px 10px; margin: 0 2px; }
      .sidebar-link .icon { font-size: 14px; width: auto; }
      .sidebar-link .badge { display: none; }
      .layout { flex-direction: column; }
      .main-content { margin-left: 0; max-width: 100%; padding: 20px 16px; }
      .topbar-user-name { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════ TOPBAR ═══════════ -->
<nav class="topbar">
  <div class="topbar-left"><button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Recolher sidebar"><span class="ico">◀</span></button></div>
  <div class="topbar-right">
    <span class="topbar-user-name" id="userName">Carregando...</span>
    <div class="topbar-avatar" id="userAvatar">?</div>
    <button class="topbar-btn" onclick="logout()">Sair</button>
  </div>
</nav>

<!-- ═══════════ LAYOUT ═══════════ -->
<div class="layout">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <img src="../img/logo-lumethos-correto.png" alt="Lumethos" class="sidebar-brand-logo">
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-top">
        <div class="sidebar-user-avatar" id="sbAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sbName">Aluno</div>
          <span class="sidebar-user-role" id="sbRole">ALUNO</span>
        </div>
      </div>
    </div>
    <div class="sidebar-stats">
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCourses">—</div>
        <div class="sidebar-stat-label">Cursos</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCompleted">—</div>
        <div class="sidebar-stat-label">Aulas</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCerts">—</div>
        <div class="sidebar-stat-label">Certif.</div>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="section-label">Principal</div>
      <a href="/aluno/dashboard.html" class="sidebar-link">
        <span class="icon">◈</span><span class="label">Dashboard</span>
      </a>
      <a href="/aluno/biblioteca.html" class="sidebar-link">
        <span class="icon">⬡</span><span class="label">Biblioteca</span>
      </a>
      <a href="#" class="sidebar-link">
        <span class="icon">⬡</span><span class="label">Certificados</span>
      </a>
      <a href="#" onclick="ssoRedirect('scriba');return false;" class="sidebar-link">
        <span class="icon">✧</span><span class="label">Scriba</span>
      </a>
      <a href="#" onclick="ssoRedirect('centelhaz');return false;" class="sidebar-link">
        <span class="icon">✦</span><span class="label">Centelhaz</span>
      </a>
    </div>
    <div class="sidebar-spacer"></div>
    <div class="sidebar-section">
      <div class="section-label">Conta</div>
      <a href="/aluno/perfil.html" class="sidebar-link active">
        <span class="icon">◉</span><span class="label">Meu Perfil</span>
      </a>
      <a href="#" onclick="logout()" class="sidebar-link">
        <span class="icon">⊘</span><span class="label">Sair</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <span class="sidebar-footer-version">Instituto Lumethos</span>
    </div>
  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main-content">
    <div class="page-title anim-in anim-d1">
      <h1>Meu Perfil</h1>
      <p id="pageSub">Carregando...</p>
    </div>
    <div id="profileContent" style="color:var(--text-muted);text-align:center;padding:40px;">Carregando perfil...</div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
  const API = '/api';
  function getToken(){ return localStorage.getItem('lumethos_token'); }
  function h(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }
  let profile = null, userData = null;

  async function init() {
    const res = await fetch(API+'/auth/me', { headers: h() });
    if (!res.ok) { window.location.href = '/login.html?redirect=' + encodeURIComponent('/aluno/perfil.html'); return; }
    const data = await res.json();
    userData = data.user || data;

    const displayName = userData.user_metadata?.name || userData.name || userData.email?.split('@')[0] || 'Aluno';
    document.getElementById('userName').textContent = displayName;
        // Populate sidebar
    document.getElementById('sbName').textContent = displayName;
    document.getElementById('sbAvatar').textContent = displayName.charAt(0).toUpperCase();
    const role = (userData.role || userData.user_metadata?.role || 'aluno');
    document.getElementById('sbRole').textContent = role === 'admin' ? 'ADMIN' : role === 'tutor' ? 'TUTOR' : 'ALUNO';
    if (profile?.profile_photo) {
      const sbAv = document.getElementById('sbAvatar');
      sbAv.style.backgroundImage = 'url(' + profile.profile_photo + ')';
      sbAv.style.backgroundSize = 'cover';
      sbAv.style.backgroundPosition = 'center';
      sbAv.textContent = '';
    }

    // Fetch sidebar stats
    try {
      const [cr, pr] = await Promise.all([
        fetch(API + '/courses', { headers: h() }),
        fetch(API + '/courses/progress', { headers: h() })
      ]);
      const courses = cr.ok ? await cr.json() : [];
      const progress = pr.ok ? await pr.json() : [];
      const pm = {};
      for (const p of progress) { if (!pm[p.course_id]) pm[p.course_id] = 0; if (p.completed) pm[p.course_id]++; }
      let courseCount = 0, completedLessons = 0;
      for (const c of courses) {
        const cc = pm[c.id] || 0;
        if (cc > 0 || pm[c.id] !== undefined) { courseCount++; completedLessons += cc; }
      }
      document.getElementById('sbCourses').textContent = courseCount;
      document.getElementById('sbCompleted').textContent = completedLessons;
    } catch(e) {}

document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();

    const pfRes = await fetch(API+'/profile', { headers: h() });
    const pf = await pfRes.json();
    profile = pf || { name: userData.user_metadata?.name || userData.name || '', email: userData.email, role: 'aluno' };
    renderProfile();
  }

  function renderProfile() {
    const name = profile.name || userData.email?.split('@')[0] || 'Aluno';
    const initial = name.charAt(0).toUpperCase();
    const mircLabel = profile.mirc_status === 'active' ? '✅ Credencial Ativa' : profile.mirc_status === 'expired' ? '❌ Expirada' : profile.mirc_status ? '⏳ Pendente' : 'Sem credencial';
    const mircClass = profile.mirc_status === 'active' ? 'active' : profile.mirc_status === 'expired' ? 'expired' : 'pending';

    document.getElementById('pageSub').textContent = name;
    document.title = name + ' · Perfil · Lumethos';

    let html = '<div class="card anim-in anim-d2">';
    const photoUrl = profile.profile_photo || '';
    html += `<div class="avatar-section">
      <div class="avatar-info">
        <strong>${name}</strong>
        ${profile.role === 'admin' ? '🔑 Administrador' : profile.role === 'tutor' ? '👨‍🏫 Tutor' : '🎓 Aluno'}
        ${userData.email ? '<br>' + userData.email : ''}
        <div class="photo-actions">
          <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="handlePhotoSelect(event)">
          <button class="btn-photo" onclick="document.getElementById('photoInput').click()">📷 ${photoUrl ? 'Alterar foto' : 'Adicionar foto'}</button>
          ${photoUrl ? '<button class="btn-photo remove" onclick="removePhoto()">🗑 Remover</button>' : ''}
        </div>
      </div>
    <div class="avatar-circle${photoUrl ? ' has-photo' : ''}" onclick="document.getElementById('photoInput').click()" id="avatarPreview" style="${photoUrl ? 'background-image:url(' + photoUrl + ')' : ''}">
        ${!photoUrl ? initial : ''}
        <div class="avatar-overlay"><span class="avatar-overlay-text">${photoUrl ? '✎ Trocar' : '📷 Foto'}</span></div>
      </div>
      </div>`;

    if (profile.mirc_code) {
      html += `<div class="mirc-badge ${mircClass}" style="margin-bottom:18px;">🛡️ ${profile.mirc_code} · ${mircLabel}</div>`;
    }

    html += `<h3>Informações Pessoais</h3>
      <div class="form-group"><label>Nome</label><input type="text" id="editName" value="${escAttr(profile.name || '')}" placeholder="Seu nome completo"></div>
      <div class="form-group"><label>Telefone (WhatsApp)</label><input type="text" id="editPhone" value="${escAttr(profile.phone || '')}" placeholder="(XX) XXXXX-XXXX"></div>
      <div class="form-group"><label>CPF (para credencial MIRC)</label><input type="text" id="editMatricula" value="${escAttr(profile.matricula || '')}" placeholder="000.000.000-00" ${profile.matricula ? 'disabled' : ''}>${profile.matricula ? '<small style="color:var(--text-muted);font-size:11px;">CPF vinculado — entre em contato para alterar</small>' : ''}</div>
      <div class="form-group"><label>Email</label><input type="email" value="${escAttr(userData.email || '')}" disabled><small style="color:var(--text-muted);font-size:11px;">Gerenciado pelo login</small></div>
      <div style="display:flex;gap:12px;margin-top:20px;flex-wrap:wrap;">
        <button class="btn-primary" onclick="saveProfile()" id="saveBtn">💾 Salvar Alterações</button>
        <a href="/aluno/dashboard.html" class="btn-outline">← Dashboard</a>
      </div>
    </div>`;

    if (profile.mirc_code) {
      html += `<div class="card anim-in anim-d2">
        <h3>Credencial MIRC</h3>
        <div style="padding:8px 0;">
          <div class="info-row"><span class="info-key">Código</span><span class="info-val">${escAttr(profile.mirc_code || '—')}</span></div>
          <div class="info-row"><span class="info-key">Status</span><span class="info-val">${mircLabel}</span></div>
          <div class="info-row"><span class="info-key">Emitida em</span><span class="info-val">${profile.mirc_issued_at ? new Date(profile.mirc_issued_at).toLocaleDateString('pt-BR') : '—'}</span></div>
        </div>
      </div>`;
    }

    if (profile.role === 'aluno' || profile.role === 'tutor') {
      html += `<div class="card anim-in anim-d2">
        <h3>Estatísticas</h3>
        <div class="stats-row">
          <span class="stat-pill" id="statCourses">📚 Carregando...</span>
          <span class="stat-pill" id="statLessons">✅ Carregando...</span>
          <span class="stat-pill" id="statCert">🏅 Carregando...</span>
        </div>
      </div>`;
    }

    document.getElementById('profileContent').innerHTML = html;
    if (profile.role === 'aluno' || profile.role === 'tutor') loadStats();
  }

  async function loadStats() {
    try {
      const r = await fetch(API+'/courses/progress', { headers: h() });
      const d = await r.json();
      const courses = d?.enrollments || d?.courses || [];
      const courseCount = courses.length;
      const lessonCount = courses.reduce((s,c) => s + (c.modules_completed || 0), 0);
      const certCount = courses.filter(c => c.progress_pct >= 100).length;
      document.getElementById('statCourses').textContent = `📚 ${courseCount} cursos`;
      document.getElementById('statLessons').textContent = `✅ ${lessonCount} aulas`;
      document.getElementById('statCert').textContent = `🏅 ${certCount} certificados`;
    } catch(e) {
      document.getElementById('statCourses').textContent = '📚 —';
      document.getElementById('statLessons').textContent = '✅ —';
      document.getElementById('statCert').textContent = '🏅 —';
    }
  }

  async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = 'Salvando...';
    const updates = {
      name: document.getElementById('editName').value.trim() || null,
      phone: document.getElementById('editPhone').value.trim() || null
    };
    try {
      const r = await fetch(API+'/profile', { method:'PUT', headers:h(), body:JSON.stringify(updates) });
      if (!r.ok) { const e = await r.json().catch(()=>({})); showToast('Erro: ' + (e.message||'Desconhecido'), true); }
      else { showToast('✅ Perfil atualizado!'); profile = {...profile, ...updates}; }
    } catch(e) { showToast('Erro: ' + e.message, true); }
    btn.disabled = false; btn.textContent = '💾 Salvar Alterações';
  }

  async function handlePhotoSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { showToast('Foto muito grande (máx 5MB)', true); return; }
    if (!file.type.startsWith('image/')) { showToast('Selecione uma imagem', true); return; }

    // Preview
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('avatarPreview').style.backgroundImage = 'url(' + ev.target.result + ')';
      document.getElementById('avatarPreview').classList.add('has-photo');
      document.getElementById('avatarPreview').innerHTML = '<div class="avatar-overlay"><span class="avatar-overlay-text">✎ Trocar</span></div>';
    };
    reader.readAsDataURL(file);

    // Upload
    showToast('Enviando foto...');
    try {
      const base64 = await new Promise((resolve) => {
        const r = new FileReader();
        r.onload = () => resolve(r.result);
        r.readAsDataURL(file);
      });
      const res = await fetch(API + '/profile/photo', {
        method: 'POST', headers: h(),
        body: JSON.stringify({ photo: base64 })
      });
      if (res.ok) {
        const data = await res.json();
        profile.profile_photo = data.photo_url;
        showToast('✅ Foto atualizada!');
        setTimeout(() => renderProfile(), 800);
      } else {
        const err = await res.json();
        showToast('Erro: ' + (err.error || 'Falha ao salvar'), true);
      }
    } catch(ex) { showToast('Erro ao enviar foto', true); }
  }

  async function removePhoto() {
    if (!confirm('Remover foto do perfil?')) return;
    try {
      const res = await fetch(API + '/profile/photo', { method: 'DELETE', headers: h() });
      if (res.ok) {
        profile.profile_photo = null;
        document.getElementById('avatarPreview').style.backgroundImage = '';
        document.getElementById('avatarPreview').classList.remove('has-photo');
        document.getElementById('avatarPreview').innerHTML = profile.name?.charAt(0).toUpperCase() || '?';
        showToast('✅ Foto removida');
        setTimeout(() => renderProfile(), 800);
      }
    } catch(ex) { showToast('Erro ao remover foto', true); }
  }

  function escAttr(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (isErr?'error ':'') + 'show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }

  async function ssoRedirect(target) {
    const token = localStorage.getItem('lumethos_token');
    if (!token) { goLogin(); return; }
    try {
      const r = await fetch('/api/auth/sso/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ target })
      });
      if (!r.ok) { alert('Erro ao acessar ' + target); return; }
      const data = await r.json();
      window.open(data.redirect_url, '_blank');
    } catch(e) { alert('Erro de conexao ao acessar ' + target); }
  }

  init();
</script>
</body>
</html>
