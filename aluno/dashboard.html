<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Área do Aluno · Instituto Lumethos</title>
  <link rel="icon" href="../img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    /* ── Lumethos Brand Palette ── */
    /* ── Lumethos Dark Palette ── */
    :root {
      --bg-deep: #0D1B2A;
      --bg-grid: #0A1523;
      --glass-bg: rgba(15,23,42,0.65);
      --glass-border: rgba(199,154,46,0.12);
      --glass-hover: rgba(20,45,76,0.8);
      --gold: #C79A2E;
      --gold-light: #E6C47A;
      --navy: #0D1B2A;
      --navy-light: #142D4C;
      --text: #E2E8F0;
      --text-dim: rgba(226,232,240,0.62);
      --text-muted: rgba(226,232,240,0.35);
      --radius: 14px;
      --radius-sm: 10px;
      --sidebar-w: 250px; --sidebar-collapsed-w: 56px;
      --topbar-h: 40px;
      --glow-gold: 0 0 25px rgba(199,154,46,0.28), 0 0 80px rgba(199,154,46,0.10);
      --glow-card: 0 0 25px rgba(199,154,46,0.14), 0 0 70px rgba(199,154,46,0.06);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ═══════════ ANIMATED GRID BACKGROUND ═══════════ */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(rgba(199,154,46,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(199,154,46,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 25%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 25%, transparent 70%);
    }

    /* Floating orbs — gold & cream accents */
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(120px); opacity: 0.10;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .bg-orb.orb-1 {
      width: 600px; height: 600px;
      background: var(--gold);
      top: -200px; right: -150px;
    }
    .bg-orb.orb-2 {
      width: 500px; height: 500px;
      background: var(--gold-light);
      bottom: -200px; left: -100px;
      animation-delay: -10s;
    }
    .bg-orb.orb-3 {
      width: 400px; height: 400px;
      background: var(--navy-light);
      top: 50%; left: 50%;
      animation-delay: -5s;
      opacity: 0.04;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1); }
      50% { transform: translate(-20px, 30px) scale(0.95); }
      75% { transform: translate(-30px, -20px) scale(1.05); }
    }

    /* ═══════════ TOPBAR - GLASS ═══════════ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--topbar-h);
      background: rgba(9,16,30,0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(199,154,46,0.18);
      box-shadow: 0 1px 30px rgba(199,154,46,0.08), 0 -1px 0 rgba(199,154,46,0.04) inset;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .topbar-left { display: flex; align-items: center; }
    .sidebar-toggle-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(199,154,46,0.06); border: 1px solid rgba(199,154,46,0.12);
      color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.3s; flex-shrink: 0;
    }
    .sidebar-toggle-btn:hover { background: rgba(199,154,46,0.14); border-color: var(--gold); box-shadow: 0 0 14px rgba(199,154,46,0.18); }
    .sidebar-toggle-btn .ico { transition: transform 0.3s; display: inline-block; }
    .sidebar.collapsed ~ .layout .sidebar-toggle-btn .ico { transform: rotate(180deg); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-user-name {
      font-size: 12.5px; color: var(--text-dim); font-weight: 500;
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      letter-spacing: 0.5px;
    }
    .topbar-avatar {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      box-shadow: 0 0 20px rgba(199,154,46,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: all 0.3s ease;
    }
    .topbar-avatar:hover {
      box-shadow: 0 0 30px rgba(199,154,46,0.45);
      transform: scale(1.05);
    }
    .topbar-status {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--gold); margin-right: 6px;
      box-shadow: 0 0 8px var(--gold-light);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .topbar-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(199,154,46,0.14);
      color: var(--text-dim); padding: 6px 14px; border-radius: 8px;
      font-size: 11px; cursor: pointer; transition: all 0.3s ease;
      font-family: 'Inter', sans-serif; font-weight: 500;
      letter-spacing: 0.3px;
    }
    .topbar-btn:hover {
      color: var(--navy-light); border-color: rgba(13,27,42,0.3);
      background: rgba(13,27,42,0.08);
      box-shadow: 0 0 15px rgba(13,27,42,0.1);
    }
    .topbar-btn.active {
      background: rgba(199,154,46,0.15); color: var(--gold);
      border-color: rgba(199,154,46,0.35);
      box-shadow: 0 0 12px rgba(199,154,46,0.2);
    }

    /* ═══════════ LAYOUT ═══════════ */
    .layout { display: flex; padding-top: var(--topbar-h); min-height: 100vh; position: relative; z-index: 1; }

    /* ═══════════ SIDEBAR - PREMIUM GLASS ═══════════ */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: linear-gradient(180deg, rgba(13,23,38,0.75) 0%, rgba(9,16,30,0.85) 100%);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-right: 1px solid rgba(199,154,46,0.12);
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      overflow-y: auto; overflow-x: hidden; z-index: 100;
      padding: 0;
      display: flex; flex-direction: column;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    /* Collapsed */
    .sidebar.collapsed {
      width: var(--sidebar-collapsed-w); min-width: var(--sidebar-collapsed-w);
    }
    .sidebar.collapsed .sidebar-brand,
    .sidebar.collapsed .sidebar-user,
    .sidebar.collapsed .sidebar-stats,
    .sidebar.collapsed .sidebar-divider,
    .sidebar.collapsed .sidebar-footer,
    .sidebar.collapsed .sidebar-link .link-label,
    .sidebar.collapsed .sidebar-link .badge,
    .sidebar.collapsed .section-label { display: none; }
    .sidebar.collapsed .sidebar-link { justify-content: center; padding: 10px 0; margin: 2px 8px; border-radius: 10px; }
    .sidebar.collapsed .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease; font-size: 18px; width: auto; margin: 0; }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(199,154,46,0.15); border-radius: 20px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    /* ── Brand ── */
    .sidebar-brand {
      padding: 12px 8px 4px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(199,154,46,0.08);
      margin: 0 10px;
    }
    .sidebar-brand-logo {
      height: 90px; width: auto;
      filter: brightness(1.2) drop-shadow(0 0 16px rgba(199,154,46,0.28));
      transition: filter 0.3s;
    }
    .sidebar-brand-logo:hover { filter: brightness(1.4) drop-shadow(0 0 24px rgba(199,154,46,0.40)); }

    /* ── User Card ── */
    .sidebar-user {
      padding: 18px 14px; margin: 12px 8px 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(199,154,46,0.06) 0%, rgba(13,27,42,0.3) 100%);
      border: 1px solid rgba(199,154,46,0.12);
      position: relative; overflow: visible;
    }
    .sidebar-user::after {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(199,154,46,0.25), transparent);
    }
    .sidebar-user-top { display: flex; align-items: center; gap: 12px; }
    .sidebar-user-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 19px; color: #fff;
      box-shadow: 0 0 18px rgba(199,154,46,0.25);
      flex-shrink: 0;
    }
    .sidebar-user-info { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-user-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1;
    }
    .sidebar-user-role {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: var(--gold); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(199,154,46,0.08); display: inline-block;
      border: 1px solid rgba(199,154,46,0.2);
      line-height: 1;
    }

    /* ── Stats Row ── */
    .sidebar-stats {
      display: flex; gap: 6px; padding: 12px 10px; margin: 8px 8px 0;
    }
    .sidebar-stat {
      flex: 1; text-align: center; padding: 8px 4px;
      border-radius: var(--radius-xs);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(199,154,46,0.08);
      transition: all var(--transition);
    }
    .sidebar-stat:hover { border-color: rgba(199,154,46,0.20); background: rgba(199,154,46,0.04); }
    .sidebar-stat-value {
      font-size: 15px; font-weight: 800; color: var(--gold-light);
      font-family: 'Cinzel', serif; line-height: 1;
    }
    .sidebar-stat-label {
      font-size: 8px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.8px; margin-top: 3px; font-family: 'Inter', sans-serif;
    }

    /* ── Divider ── */
    .sidebar-divider {
      margin: 10px 16px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(199,154,46,0.3) 15%, rgba(199,154,46,0.3) 85%, transparent 100%);
    }

    /* ── Nav Sections ── */
    .sidebar-section { padding: 0 10px; margin-bottom: 6px; }
    .sidebar-section .section-label {
      font-size: 8px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); padding: 0 12px; margin-bottom: 8px;
      font-weight: 700; font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); opacity: 0.4;
    }

    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      color: var(--text-dim); text-decoration: none;
      font-size: 12.5px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      font-weight: 500; margin-bottom: 1px;
      position: relative; overflow: hidden;
    }
    .sidebar-link::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(199,154,46,0), rgba(199,154,46,0.06));
      opacity: 0; transition: opacity 0.3s ease;
    }
    .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease;
      font-size: 17px; width: 22px; text-align: center; flex-shrink: 0;
      transition: all 0.3s ease; position: relative; z-index: 1;
    }
    .sidebar-link .label { position: relative; z-index: 1; }
    .sidebar-link .badge {
      margin-left: auto; padding: 2px 7px; border-radius: 5px;
      font-size: 8px; font-weight: 700; letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace; position: relative; z-index: 1;
      background: rgba(199,154,46,0.10); color: var(--gold-light);
    }

    .sidebar-link:hover { background: rgba(199,154,46,0.06); color: var(--gold-light); }
    .sidebar-link:hover::after { opacity: 1; }
    .sidebar-link:hover .icon { transform: scale(1.18);
      filter: drop-shadow(0 0 6px rgba(199,154,46,0.5)); }
    .sidebar-link:hover .badge { background: rgba(199,154,46,0.18); }

    /* Active — gold glow */
    .sidebar-link.active {
      background: linear-gradient(90deg, rgba(199,154,46,0.08) 0%, rgba(199,154,46,0.02) 100%);
      color: var(--gold-light);
      border-left: 2px solid var(--gold);
      padding-left: 10px;
      box-shadow: inset 0 0 20px rgba(199,154,46,0.04);
    }
    .sidebar-link.active .badge { background: rgba(199,154,46,0.20); color: var(--gold-light); }

    .sidebar-spacer { flex: 1; }

    /* ── Footer ── */
    .sidebar-footer {
      padding: 8px 16px; margin: 0 8px 10px;
      border-top: 1px solid rgba(199,154,46,0.06);
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-footer-version {
      font-size: 10px; color: var(--text-dim);
      font-family: 'Inter', sans-serif; opacity: 0.45;
      letter-spacing: 0.3px; font-weight: 400;
    }

    /* ═══════════ MAIN ═══════════ */
    .main-content {
      flex: 1; margin-left: var(--sidebar-w);
      padding: 28px 32px 60px;
      max-width: calc(100% - var(--sidebar-w));
      transition: margin-left 0.35s cubic-bezier(0.4,0,0.2,1), max-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.collapsed ~ .main-content {
      margin-left: var(--sidebar-collapsed-w);
      max-width: calc(100% - var(--sidebar-collapsed-w));
    }

    /* ═══════════ SECTION HEADERS ═══════════ */
    .section-header {
      display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
    }
    .section-header h2 {
      font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
    }
    .section-header .header-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(199,154,46,0.3), transparent);
    }
    .section-header .header-glow {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px var(--gold-light), 0 0 24px var(--gold);
      animation: pulse 2s infinite;
    }

    /* ═══════════ STAT CARDS ROW ═══════════ */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 22px 24px;
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(199,154,46,0.06) 0%, transparent 60%);
      opacity: 0; transition: opacity 0.3s;
    }
    .stat-card:hover::after { opacity: 1; }
    .stat-card:hover {
      border-color: rgba(199,154,46,0.25);
      box-shadow: 0 0 30px rgba(199,154,46,0.08);
      transform: translateY(-2px);
    }
    .stat-card .stat-icon {
      font-size: 28px; margin-bottom: 12px; display: block;
    }
    .stat-card .stat-value {
      font-size: 28px; font-weight: 800; background: linear-gradient(135deg, var(--text), var(--text-dim));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .stat-label {
      font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 1px; margin-top: 4px;
    }

    /* ═══════════ HERO PANEL ═══════════ */
    .hero-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(199,154,46,0.12);
      border-radius: var(--radius);
      padding: 36px 40px;
      margin-bottom: 32px;
      display: flex; align-items: center; gap: 32px;
      position: relative; overflow: hidden;
    }
    .hero-panel::before {
      content: ''; position: absolute; top: -50%; right: -10%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(199,154,46,0.08) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-panel::after {
      content: ''; position: absolute; bottom: -30%; left: 20%;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(199,154,46,0.05) 0%, transparent 70%);
      border-radius: 50%;
    }
    .hero-ring { position: relative; z-index: 1; flex-shrink: 0; }
    .hero-ring svg { transform: rotate(-90deg); }
    .hero-ring .ring-text {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      font-size: 18px; font-weight: 800;
      background: linear-gradient(135deg, var(--gold-light), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-info { position: relative; z-index: 1; flex: 1; }
    .hero-info .hero-greeting {
      font-size: 12px; text-transform: uppercase; letter-spacing: 3px;
      color: var(--gold); margin-bottom: 8px;
      font-family: 'JetBrains Mono', monospace; font-weight: 700;
      text-shadow: 0 0 10px rgba(199,154,46,0.3);
    }
    .hero-info h1 {
      font-size: 30px; font-weight: 800; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 50%, var(--gold-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -0.5px;
    }
    .hero-info .hero-sub {
      font-size: 13.5px; color: var(--text-dim); line-height: 1.6;
      margin-bottom: 18px; max-width: 420px;
    }
    .hero-actions { display: flex; gap: 12px; position: relative; z-index: 1; }
    .btn-neon {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 26px; border-radius: 10px;
      font-weight: 700; font-size: 13px; cursor: pointer;
      text-decoration: none; transition: all 0.3s ease;
      font-family: 'Inter', sans-serif; border: none;
    }
    .btn-neon.primary {
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      color: #fff;
      box-shadow: 0 0 20px rgba(199,154,46,0.3), 0 4px 12px rgba(0,0,0,0.3);
    }
    .btn-neon.primary:hover {
      box-shadow: 0 0 40px rgba(199,154,46,0.5), 0 8px 24px rgba(0,0,0,0.4);
      transform: translateY(-2px);
    }
    .btn-neon.secondary {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-dim);
    }
    .btn-neon.secondary:hover {
      border-color: rgba(199,154,46,0.4);
      color: var(--gold);
      box-shadow: 0 0 20px rgba(199,154,46,0.1);
    }

    /* ═══════════ NETFLIX-STYLE ROWS ═══════════ */
    .content-row { margin-bottom: 40px; }
    .row-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .row-title {
      font-size: 17px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .row-title .row-accent {
      width: 4px; height: 18px; border-radius: 2px;
      display: inline-block;
    }
    .row-title .row-accent.gold { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-title .row-accent.cyan { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-title .row-accent.emerald { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-scroll {
      display: flex; gap: 16px; overflow-x: auto;
      padding: 4px 2px 16px;
      scroll-behavior: smooth;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .row-scroll::-webkit-scrollbar { display: none; }
    .row-link {
      font-size: 12px; font-weight: 600; color: var(--gold);
      text-decoration: none; transition: color 0.2s;
    }
    .row-link:hover { color: var(--gold-light); }
    .course-grid-netflix {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px; padding: 4px 2px 16px;
    }

    /* ═══════════ COURSE CARD - GLASS ═══════════ */
    .course-card {
      min-width: 270px; max-width: 270px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(199,154,46,0.10);
      border-radius: var(--radius);
      overflow: hidden; transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0; cursor: pointer; text-decoration: none; color: inherit;
      position: relative;
    }
    .course-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(199,154,46,0.05), transparent, rgba(199,154,46,0.05));
      opacity: 0; transition: opacity 0.4s;
      border-radius: var(--radius); z-index: 0;
    }
    .course-card:hover::before { opacity: 1; }
    .course-card:hover {
      transform: translateY(-8px);
      border-color: rgba(199,154,46,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(199,154,46,0.15), 0 0 40px rgba(199,154,46,0.08);
    }
    .course-card .card-thumb {
      height: 150px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(15,23,42,0.8) 0%, rgba(2,6,23,0.9) 100%);
    }
    .course-card .card-thumb::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background: linear-gradient(0deg, rgba(2,6,23,0.7) 0%, transparent 40%);
    }
    .course-card .card-thumb-img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.6s ease;
    }
    .course-card:hover .card-thumb-img { transform: scale(1.12); }
    .course-card .card-badge {
      position: absolute; top: 12px; right: 12px;
      font-size: 10px; font-weight: 800; padding: 4px 10px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px;
      z-index: 2;
    }
    .course-card .card-badge.progress {
      background: rgba(199,154,46,0.12); color: var(--gold);
      border: 1px solid rgba(199,154,46,0.25);
    }
    .course-card .card-badge.new {
      background: rgba(199,154,46,0.12); color: var(--gold);
      border: 1px solid rgba(199,154,46,0.25);
    }
    .course-card .card-badge.done {
      background: rgba(199,154,46,0.12); color: var(--gold);
      border: 1px solid rgba(199,154,46,0.25);
    }
    .course-card .card-badge.available {
      background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.6);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .course-card .card-play-btn {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease; z-index: 3;
    }
    .course-card .card-play-circle {
      width: 52px; height: 52px; border-radius: 14px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 30px rgba(199,154,46,0.3);
      transform: scale(0.7); transition: transform 0.3s ease;
    }
    .course-card:hover .card-play-btn { opacity: 1; }
    .course-card:hover .card-play-circle { transform: scale(1); }
    .course-card .card-body { padding: 14px 16px; position: relative; z-index: 1; }
    .course-card .card-body h4 {
      font-size: 14px; font-weight: 600; margin: 0;
      line-height: 1.3;
    }

    /* ── Card Purchase Footer Bar ── */
    .course-card .card-bar-purchased {
      height: 3px; border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      background: linear-gradient(90deg, #10b981, #059669);
      box-shadow: 0 0 14px rgba(16,185,129,0.35);
    }
    .course-card .card-bar-locked {
      height: 3px; border-radius: 0 0 var(--radius-sm) var(--radius-sm);
      background: linear-gradient(90deg, #ef4444, #dc2626);
      box-shadow: 0 0 14px rgba(239,68,68,0.25);
    }
    .course-card.card-locked {
      cursor: not-allowed; opacity: 0.7;
      filter: grayscale(30%);
    }
    .course-card.card-locked:hover {
      opacity: 0.85; filter: grayscale(15%);
    }
    .course-card .card-lock-overlay {
      position: absolute; inset: 0; z-index: 5;
      background: rgba(0,0,0,0.35);
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--radius-sm);
      opacity: 0; transition: opacity 0.3s;
    }
    .course-card.card-locked:hover .card-lock-overlay { opacity: 1; }
    .card-lock-icon {
      font-size: 32px; filter: drop-shadow(0 0 8px rgba(239,68,68,0.5));
      animation: lockPulse 2s infinite;
    }
    @keyframes lockPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    /* ── View toggle ── */
    .view-section.hidden { display: none; }

    /* ═══════════ EMPTY STATE ═══════════ */
    .empty-state {
      text-align: center; padding: 80px 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
    }
    .empty-state .empty-glow {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(199,154,46,0.1), rgba(199,154,46,0.1));
      border: 1px solid rgba(199,154,46,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 20px;
    }
    .empty-state h3 {
      font-size: 22px; font-weight: 700; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .empty-state p {
      color: var(--text-dim); font-size: 14px; margin-bottom: 24px;
      max-width: 400px; margin-left: auto; margin-right: auto;
    }

    /* ═══════════ ANIMATIONS ═══════════ */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .anim-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    .anim-d1 { animation-delay: 0.04s; }
    .anim-d2 { animation-delay: 0.1s; }
    .anim-d3 { animation-delay: 0.16s; }
    .anim-d4 { animation-delay: 0.22s; }
    .anim-d5 { animation-delay: 0.28s; }

    /* Loading skeleton */
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* ═══════════ RESPONSIVE ═══════════ */
    @media(max-width:1024px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width:768px) {
      .sidebar { width: 100%; min-width: 100%; position: relative; top: auto; bottom: auto; height: auto; border-right: none; border-bottom: 1px solid rgba(199,154,46,0.12); padding: 6px 0; flex-direction: row; overflow-x: auto; background: rgba(13,23,38,0.75); }
      .sidebar-brand { display: none; }
      .sidebar-user, .sidebar-stats, .sidebar-divider, .sidebar-footer { display: none; }
      .sidebar-section { padding: 0 3px; margin: 0; display: flex; }
      .sidebar-section .section-label { display: none; }
      .sidebar-link { white-space: nowrap; font-size: 10px; padding: 6px 8px; margin: 0 1px; border-radius: 6px; }
      .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease; font-size: 13px; width: auto; }
      .sidebar-link .badge { display: none; }
      .sidebar-link.active { border-left: none; padding-left: 8px; }
      .topbar-logo { display: inline-block; height: 28px; filter: brightness(1.05) drop-shadow(0 0 6px rgba(199,154,46,0.15)); }
      .sidebar-link::after { display: none; }
      .layout { flex-direction: column; }
      .main-content { margin-left: 0; max-width: 100%; padding: 16px 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .stat-card { padding: 16px; }
      .stat-card .stat-value { font-size: 22px; }
      .hero-panel { flex-direction: column; text-align: center; padding: 24px 16px; }
      .hero-info h1 { font-size: 22px; }
      .hero-actions { justify-content: center; }
      .course-card { min-width: 200px; max-width: 200px; }
      .course-card .card-thumb { height: 110px; }
      .topbar-user-name { display: none; }
      .course-grid-netflix { grid-template-columns: repeat(2, 1fr); }
    }
    @media(max-width:480px) {
      .course-grid-netflix { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Floating orbs -->
<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<!-- ═══════════ TOPBAR ═══════════ -->
<nav class="topbar">
  <div class="topbar-left"><button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Recolher sidebar"><span class="ico">◀</span></button></div>
  <div class="topbar-right">
    <button class="topbar-btn active" id="btnBiblioteca" onclick="switchView('biblioteca')">Biblioteca</button>
    <button class="topbar-btn" id="btnMeusCursos" onclick="switchView('meuscursos')">Meus Cursos</button>
    <span class="topbar-status"></span>
    <span class="topbar-user-name" id="userName">// carregando...</span>
    <div class="topbar-avatar" id="userAvatar">?</div>
    <button class="topbar-btn" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<!-- ═══════════ LAYOUT ═══════════ -->
<div class="layout">

  <!-- ═══════════ SIDEBAR ═══════════ -->

    </div>
    <!-- User Card -->
    <div class="sidebar-user">
      <div class="sidebar-user-top">
        <div class="sidebar-user-avatar" id="sbAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sbName">Aluno</div>

        </div>
      </div>

    <!-- Stats -->

      <div class="sidebar-stat">

      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCompleted">0</div>
        <div class="sidebar-stat-label">Aulas</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCerts">0</div>

      </div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Nav -->
    <div class="sidebar-section">
      <div class="section-label">Principal</div>
      <a href="/aluno/dashboard.html" class="sidebar-link active">
        <span class="icon">◆</span><span class="label">Dashboard</span>
      </a>
      <a href="/aluno/certificados.html" class="sidebar-link">
        <span class="icon">✦</span><span class="label">Certificados</span>
      </a>
    </div>

    <div class="sidebar-section">
      <div class="section-label">Ferramentas</div>
      <a href="#" class="sidebar-link" onclick="showToast('📖 Bíblia de Estudo em breve!');return false;">

      <a href="#" class="sidebar-link" onclick="showToast('📚 Biblioteca do Pregador em breve!');return false;">
        <span class="icon">📚</span><span class="label">Bib. do Pregador</span>
        <span class="badge">EM BREVE</span>
      </a>
      <a href="#" onclick="ssoRedirect('centelhaz');return false;" class="sidebar-link">
        <span class="icon">⚡</span><span class="label">Centelhaz</span>
      </a>
      <a href="#" onclick="ssoRedirect('scriba');return false;" class="sidebar-link">
        <span class="icon">◈</span><span class="label">Scriba</span>
        <span class="badge">BETA</span>
      </a>

    <div class="sidebar-section admin-only" style="display:none;">

        <span class="icon">💰</span><span class="label">Financeiro</span>

    <div class="sidebar-spacer"></div>

    <div class="sidebar-section">
      <div class="section-label">Conta</div>
      <a href="/aluno/perfil.html" class="sidebar-link">
        <span class="icon">○</span><span class="label">Meu Perfil</span>

      <a href="#" onclick="logout()" class="sidebar-link">
        <span class="icon">↩</span><span class="label">Sair</span>
      </a>

    <!-- Footer -->

  <!-- ═══════════ MAIN ═══════════ -->
  <main class="main-content" id="mainContent">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
      <div style="text-align:center;color:var(--text-muted);">
        <div class="skeleton" style="width:48px;height:48px;border-radius:14px;margin:0 auto 16px;"></div>
        <div style="font-family:'JetBrains Mono',monospace;font-size:12px;">LOADING...</div>
      </div>
    </div>

</div>

<script>
  const API = '/api';
  const TOKEN = localStorage.getItem('lumethos_token');
  const headers = () => ({ 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN });

  async function checkAuth() {
    if (!TOKEN) { goLogin(); return null; }
    try {
      const r = await fetch(API + '/auth/me', { headers: headers() });
      if (!r.ok) { localStorage.clear(); goLogin(); return null; }
      return await r.json();
    } catch (e) { localStorage.clear(); goLogin(); return null; }
  }

  function goLogin() { window.location.href = '/login.html?redirect=' + encodeURIComponent(location.pathname + location.search); }

  // ── Sidebar collapse toggle ──
  (function() {
    const sidebar = document.querySelector('.sidebar');
    const saved = localStorage.getItem('lumethos_sidebar_collapsed');
    if (saved === '1') sidebar.classList.add('collapsed');
  })();
  function toggleSidebar() {
    const sidebar = document.querySelector('.sidebar');
    sidebar.classList.toggle('collapsed');
    localStorage.setItem('lumethos_sidebar_collapsed', sidebar.classList.contains('collapsed') ? '1' : '0');
  }
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }

  async function ssoRedirect(target) {
    const token = localStorage.getItem('lumethos_token');
    if (!token) { goLogin(); return; }
    try {
      const r = await fetch('/api/auth/sso/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ target })
      });
      if (!r.ok) { alert('Erro ao acessar ' + target); return; }
      const data = await r.json();
      window.open(data.redirect_url, '_blank');
    } catch(e) { alert('Erro de conexao ao acessar ' + target); }
  }

  function ringSVG(pct, sz = 110) {
    const r = 42, circ = 2 * Math.PI * r, offset = circ - (pct/100) * circ;
    return `<svg width="${sz}" height="${sz}" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="5"/>
      <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#C79A2E"/><stop offset="100%" stop-color="#C79A2E"/>
      </linearGradient></defs>
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="url(#rg)" stroke-width="5"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        style="filter:drop-shadow(0 0 6px rgba(199,154,46,0.4))"/>
    </svg>`;
  }

  const courseImages = {
    'capelania-crista': 'capelania.webp',
    'teologia': 'teologia.webp',
    'ministerio-pastoral': 'pastoral.webp',
    'diaconia': 'pastoral.webp',
    'musica-louvor': 'teologia.webp',
    'infantil': 'infantil.webp',
    'jovens': 'jovens.webp',
    'curso-teste-tutor': 'capelania.webp'
  };

  // ── Module-scope shared state ──
  let allCourses = [];
  let enrolledIds = new Set();
  let enrollments = [];
  let displayName = '';
  let profile = null;

  async function loadDashboard() {
    const authData = await checkAuth();
    if (!authData || !authData.user) return;

    const user = authData.user;
    const nameFallback = (user.email || '').split('@')[0] || 'Aluno';

    try { const r = await fetch(API + '/profile', { headers: headers() }); if (r.ok) profile = await r.json(); } catch(e) {}
    displayName = profile?.name || nameFallback;
    const role = user.role || 'aluno';
    document.getElementById('userName').textContent = '// ' + displayName.toLowerCase();
    document.getElementById('userAvatar').textContent = displayName.charAt(0).toUpperCase();

    // Populate sidebar
    document.getElementById('sbName').textContent = displayName;
    document.getElementById('sbAvatar').textContent = displayName.charAt(0).toUpperCase();
    document.getElementById('sbRole').textContent = role === 'admin' ? 'ADMIN' : role === 'tutor' ? 'TUTOR' : 'ALUNO';
    if (role === 'admin' || role === 'superadmin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }
    if (profile?.profile_photo) {
      const sbAv = document.getElementById('sbAvatar');
      sbAv.style.backgroundImage = 'url(' + profile.profile_photo + ')';
      sbAv.style.backgroundSize = 'cover';
      sbAv.style.backgroundPosition = 'center';
      sbAv.textContent = '';
    }

    // Fetch all data once
    try {
      const [coursesRes, progressRes] = await Promise.all([
        fetch(API + '/courses', { headers: headers() }),
        fetch(API + '/courses/progress', { headers: headers() })
      ]);
      allCourses = coursesRes.ok ? await coursesRes.json() : [];
      const progress = progressRes.ok ? await progressRes.json() : [];

      // Build progress map
      const progressMap = {};
      for (const p of progress) {
        if (!progressMap[p.course_id]) progressMap[p.course_id] = 0;
        if (p.completed) progressMap[p.course_id]++;
      }

      // Enrolled = courses with any progress
      enrolledIds = new Set();
      for (const c of allCourses) {
        const completedCount = progressMap[c.id] || 0;
        if (completedCount > 0 || progressMap[c.id] !== undefined) {
          enrolledIds.add(c.id);
          const totalLessons = c.total_lessons || 0;
          const pct = totalLessons > 0 ? Math.round((completedCount / totalLessons) * 100) : 0;
          enrollments.push({
            id: c.id, slug: c.slug, title: c.title,
            image_url: '/img/cursos/' + (courseImages[c.slug] || c.slug + '.webp'), color: c.color || '#151f38',
            progress_pct: pct,
            modules_completed: completedCount,
            total_modules: totalLessons
          });
        }
      }
      // Admin e Tutor têm acesso total — todos os cursos liberados
      if (role === 'admin' || role === 'superadmin' || role === 'tutor') {
        for (const c of allCourses) { enrolledIds.add(c.id); }
      }
    } catch(e) { console.error('Erro ao carregar cursos:', e); }

    // Update sidebar stats
    const inProgress = enrollments.filter(c => c.progress_pct > 0 && c.progress_pct < 100);
    const completed = enrollments.filter(c => c.progress_pct >= 100);
    const totalModules = enrollments.reduce((s, c) => s + (c.modules_completed || 0), 0);
    document.getElementById('sbCourses').textContent = enrollments.length;
    document.getElementById('sbCompleted').textContent = totalModules;
    document.getElementById('sbCerts').textContent = completed.length;

    // Build both views
    renderBibliotecaView();
    renderMeusCursosView();
    switchView('biblioteca');
  }

  function switchView(view) {
    const biblio = document.getElementById('viewBiblioteca');
    const meus = document.getElementById('viewMeusCursos');
    const btnB = document.getElementById('btnBiblioteca');
    const btnM = document.getElementById('btnMeusCursos');

    if (view === 'biblioteca') {
      biblio.classList.remove('hidden');
      meus.classList.add('hidden');
      btnB.classList.add('active');
      btnM.classList.remove('active');
    } else {
      meus.classList.remove('hidden');
      biblio.classList.add('hidden');
      btnM.classList.add('active');
      btnB.classList.remove('active');
    }
  }

  function renderBibliotecaView() {
    const main = document.getElementById('mainContent');
    let html = '<div class="view-section" id="viewBiblioteca">';

    /* ── Banner ── */
    html += `<div class="hero-panel anim-in anim-d1">
      <div class="hero-info">
        <div class="hero-greeting">Biblioteca do Instituto</div>
        <h1>Olá, ${displayName.split(' ')[0]}</h1>
        <div class="hero-sub">Explore nossa coleção completa de formações ministeriais. Cursos com <span style="color:#10b981">barra verde</span> você já possui acesso.</div>
      </div>
    </div>`;

    /* ── All courses Netflix grid ── */
    html += `<div class="content-row anim-in anim-d2" id="biblioteca">
      <div class="row-header"><div class="row-title"><span class="row-accent gold"></span>Todos os Cursos</div></div>
      <div class="course-grid-netflix">`;
    for (const c of allCourses) {
      const purchased = enrolledIds.has(c.id);
      const img = courseImages[c.slug] ? '/img/cursos/' + courseImages[c.slug] : null;
      html += `<div class="course-card${purchased ? '' : ' card-locked'}" ${purchased ? `onclick="location.href='/aluno/curso.html?slug=${c.slug}'"` : `onclick="alert('🔒 Curso não adquirido.\n\nAdquira este curso para acessar o conteúdo completo.\n\nEntre em contato: contato@institutolumethos.online')"`}>
        <div class="card-thumb">
          ${img ? `<img src="${img}" alt="${c.title}" class="card-thumb-img" loading="lazy" onerror="this.style.display='none'">` : ''}
          ${purchased ? '<span class="card-badge new">SEU CURSO</span>' : '<span class="card-badge available">DISPONÍVEL</span>'}
          <div class="card-play-btn"><div class="card-play-circle">${purchased ? '▶' : '🔒'}</div></div>
        </div>
        <div class="card-body">
          <h4>${c.title}</h4>
        </div>
        <div class="${purchased ? 'card-bar-purchased' : 'card-bar-locked'}"></div>
      </div>`;
    }
    html += `</div></div></div>`;

    main.innerHTML = html + '<div class="view-section hidden" id="viewMeusCursos"></div>';
  }

  function renderMeusCursosView() {
    const container = document.getElementById('viewMeusCursos');
    if (!container) return;

    const inProgress = enrollments.filter(c => c.progress_pct > 0 && c.progress_pct < 100);
    const notStarted = enrollments.filter(c => c.progress_pct === 0);
    const completed = enrollments.filter(c => c.progress_pct >= 100);
    const currentCourse = inProgress[0] || completed[0] || null;
    const overallPct = enrollments.length > 0
      ? Math.round(enrollments.reduce((s, c) => s + c.progress_pct, 0) / enrollments.length) : 0;
    const totalModules = enrollments.reduce((s, c) => s + (c.modules_completed || 0), 0);

    let html = '';

    /* ── Stats Grid ── */
    html += `<div class="stats-grid anim-in anim-d1">
      <div class="stat-card"><span class="stat-icon">◆</span><div class="stat-value">${enrollments.length}</div><div class="stat-label">Cursos ativos</div></div>
      <div class="stat-card"><span class="stat-icon">◇</span><div class="stat-value">${totalModules}</div><div class="stat-label">Módulos concluídos</div></div>
      <div class="stat-card"><span class="stat-icon">⬡</span><div class="stat-value">${completed.length}</div><div class="stat-label">Certificados</div></div>
      <div class="stat-card"><span class="stat-icon">⬢</span><div class="stat-value">${overallPct}%</div><div class="stat-label">Progresso total</div></div>
    </div>`;

    /* ── Hero Panel ── */
    html += `<div class="hero-panel anim-in anim-d2">
      <div class="hero-ring">
        ${currentCourse ? ringSVG(currentCourse.progress_pct, 120) : ringSVG(overallPct, 120)}
        <div class="ring-text">${currentCourse ? currentCourse.progress_pct : overallPct}%</div>
      </div>
      <div class="hero-info">
        <div class="hero-greeting">Bem-vindo de volta</div>
        <h1>${displayName.split(' ')[0]}</h1>
        <div class="hero-sub">${currentCourse
          ? `<span style="color:var(--gold-light)">${currentCourse.title}</span> · ${currentCourse.modules_completed}/${currentCourse.total_modules} módulos · Continue de onde parou`
          : 'Explore nossa biblioteca e matricule-se no seu primeiro curso.'}</div>
        <div class="hero-actions">
          ${currentCourse ? `<a href="/aluno/curso.html?slug=${currentCourse.slug}" class="btn-neon primary">▶ Continuar</a>` : ''}
        </div>
      </div>
    </div>`;

    if (enrollments.length === 0) {
      html += `<div class="empty-state anim-in anim-d3">
        <div class="empty-glow">◆</div>
        <h3>Nenhum curso ainda</h3>
        <p>Volte para a Biblioteca e escolha seu primeiro curso.</p>
        <a href="#" onclick="switchView('biblioteca');return false;" class="btn-neon primary">Explorar Biblioteca →</a>
      </div>`;
    }

    /* ── Continue Watching ── */
    if (inProgress.length > 0) {
      html += `<div class="content-row anim-in anim-d3">
        <div class="row-header"><div class="row-title"><span class="row-accent gold"></span>Continue Assistindo</div></div>
        <div class="row-scroll">${inProgress.map(c => enrolledCard(c, 'progress')).join('')}</div>
      </div>`;
    }

    /* ── Minha Biblioteca ── */
    if (notStarted.length > 0) {
      html += `<div class="content-row anim-in anim-d4">
        <div class="row-header"><div class="row-title"><span class="row-accent cyan"></span>Minha Biblioteca</div></div>
        <div class="row-scroll">${notStarted.map(c => enrolledCard(c, 'new')).join('')}</div>
      </div>`;
    }

    /* ── Completed ── */
    if (completed.length > 0) {
      html += `<div class="content-row anim-in anim-d5">
        <div class="row-header"><div class="row-title"><span class="row-accent emerald"></span>Concluídos</div></div>
        <div class="row-scroll">${completed.map(c => enrolledCard(c, 'done')).join('')}</div>
      </div>`;
    }

    container.innerHTML = html;
  }

  function enrolledCard(c, badgeType) {
    const badgeLabel = badgeType === 'new' ? 'NOVO' : badgeType === 'done' ? '100%' : `${c.progress_pct}%`;
    return `<a href="/aluno/curso.html?slug=${c.slug}" class="course-card">
      <div class="card-thumb">
        ${c.image_url ? `<img src="${c.image_url}" alt="${c.title}" class="card-thumb-img" loading="lazy" onerror="this.style.display='none'">` : ''}
        <span class="card-badge ${badgeType}">${badgeLabel}</span>
        <div class="card-play-btn"><div class="card-play-circle">${badgeType === 'done' ? '↻' : '▶'}</div></div>
      </div>
      <div class="card-body">
        <h4>${c.title}</h4>
      </div>
      <div class="card-bar-purchased"></div>
    </a>`;
  }

  loadDashboard();
</script>
</body>
</html>
