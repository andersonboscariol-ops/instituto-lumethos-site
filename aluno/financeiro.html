<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Biblioteca · Instituto Lumethos</title>
  <link rel="icon" href="../img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --bg-deep: #0D1B2A; --glass-bg: rgba(15,23,42,0.65);
      --glass-border: rgba(255,255,255,0.06); --glass-hover: rgba(30,41,59,0.8);
      --gold: #C79A2E; --gold-neon: #E6C47A;
      --purple: #C79A2E; --purple-neon: #E6C47A;
      --cyan: #C79A2E; --cyan-neon: #E6C47A;
      --emerald: #C79A2E; --emerald-neon: #E6C47A;
      --rose: #0D1B2A; --rose-neon: #142D4C;
      --text: #E2E8F0; --text-dim: rgba(226,232,240,0.6);
      --text-muted: rgba(226,232,240,0.35);
      --radius: 14px; --radius-sm: 10px;
      --sidebar-w: 250px; --sidebar-collapsed-w: 56px; --topbar-h: 40px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep); color: var(--text);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Animated grid */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        linear-gradient(rgba(199,154,46,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(199,154,46,0.025) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 30%, transparent 70%);
      -webkit-mask-image: radial-gradient(ellipse 80% 50% at 50% 50%, black 30%, transparent 70%);
    }

    /* Orbs */
    .bg-orb {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
      filter: blur(100px); opacity: 0.10;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .bg-orb.orb-1 { width: 600px; height: 600px; background: var(--gold); top: -200px; right: -150px; }
    .bg-orb.orb-2 { width: 500px; height: 500px; background: var(--gold); bottom: -200px; left: -100px; animation-delay: -10s; }
    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -40px) scale(1.1); }
      50% { transform: translate(-20px, 30px) scale(0.95); }
      75% { transform: translate(-30px, -20px) scale(1.05); }
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ═══ TOPBAR ═══ */
    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: var(--topbar-h);
      background: rgba(9,16,30,0.88);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(199,154,46,0.18);
      box-shadow: 0 1px 30px rgba(199,154,46,0.08), 0 -1px 0 rgba(199,154,46,0.04) inset;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
    }
    .topbar-left { display: flex; align-items: center; }
    .sidebar-toggle-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: rgba(199,154,46,0.06); border: 1px solid rgba(199,154,46,0.12);
      color: var(--gold); cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 14px; transition: all 0.3s; flex-shrink: 0;
    }
    .sidebar-toggle-btn:hover { background: rgba(199,154,46,0.14); border-color: var(--gold); box-shadow: 0 0 14px rgba(199,154,46,0.18); }
    .sidebar-toggle-btn .ico { transition: transform 0.3s; display: inline-block; }
    .sidebar.collapsed ~ .layout .sidebar-toggle-btn .ico { transform: rotate(180deg); }
    .topbar-right { display: flex; align-items: center; gap: 14px; }
    .topbar-user-name { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; }
    .topbar-avatar {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px;
      box-shadow: 0 0 20px rgba(199,154,46,0.25);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .topbar-btn {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(199,154,46,0.14);
      color: var(--text-dim); padding: 6px 14px; border-radius: 8px;
      font-size: 11px; cursor: pointer; transition: all 0.3s ease;
      font-family: 'Inter', sans-serif; font-weight: 500; letter-spacing: 0.3px;
    }
    .topbar-btn:hover { color: var(--navy-light); border-color: rgba(13,27,42,0.3); box-shadow: 0 0 15px rgba(13,27,42,0.1); }

    /* ═══ LAYOUT ═══ */
    .layout { display: flex; padding-top: var(--topbar-h); min-height: 100vh; position: relative; z-index: 1; }

    /* ═══════════ SIDEBAR - PREMIUM GLASS ═══════════ */
    .sidebar {
      width: var(--sidebar-w); min-width: var(--sidebar-w);
      background: linear-gradient(180deg, rgba(13,23,38,0.75) 0%, rgba(9,16,30,0.85) 100%);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-right: 1px solid rgba(199,154,46,0.12);
      position: fixed; top: var(--topbar-h); left: 0; bottom: 0;
      overflow-y: auto; overflow-x: hidden; z-index: 100;
      padding: 0;
      display: flex; flex-direction: column;
      transition: width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    /* Collapsed */
    .sidebar.collapsed {
      width: var(--sidebar-collapsed-w); min-width: var(--sidebar-collapsed-w);
    }
    .sidebar.collapsed .sidebar-brand,
    .sidebar.collapsed .sidebar-user,
    .sidebar.collapsed .sidebar-stats,
    .sidebar.collapsed .sidebar-divider,
    .sidebar.collapsed .sidebar-footer,
    .sidebar.collapsed .sidebar-link .link-label,
    .sidebar.collapsed .sidebar-link .badge,
    .sidebar.collapsed .section-label { display: none; }
    .sidebar.collapsed .sidebar-link { justify-content: center; padding: 10px 0; margin: 2px 8px; border-radius: 10px; }
    .sidebar.collapsed .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease; font-size: 18px; width: auto; margin: 0; }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-thumb { background: rgba(199,154,46,0.15); border-radius: 20px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    /* ── Brand ── */
    .sidebar-brand {
      padding: 12px 8px 4px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(199,154,46,0.08);
      margin: 0 10px;
    }
    .sidebar-brand-logo {
      height: 90px; width: auto;
      filter: brightness(1.2) drop-shadow(0 0 16px rgba(199,154,46,0.28));
      transition: filter 0.3s;
    }
    .sidebar-brand-logo:hover { filter: brightness(1.4) drop-shadow(0 0 24px rgba(199,154,46,0.40)); }

    /* ── User Card ── */
    .sidebar-user {
      padding: 18px 14px; margin: 12px 8px 0;
      border-radius: var(--radius);
      background: linear-gradient(135deg, rgba(199,154,46,0.06) 0%, rgba(13,27,42,0.3) 100%);
      border: 1px solid rgba(199,154,46,0.12);
      position: relative; overflow: visible;
    }
    .sidebar-user::after {
      content: ''; position: absolute; top: -1px; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(199,154,46,0.25), transparent);
    }
    .sidebar-user-top { display: flex; align-items: center; gap: 12px; }
    .sidebar-user-avatar {
      width: 42px; height: 42px; border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), var(--navy-light));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 19px; color: #fff;
      box-shadow: 0 0 18px rgba(199,154,46,0.25);
      flex-shrink: 0;
    }
    .sidebar-user-info { display: flex; flex-direction: column; gap: 6px; }
    .sidebar-user-name {
      font-size: 14px; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      line-height: 1;
    }
    .sidebar-user-role {
      font-size: 10px; font-weight: 600; letter-spacing: 1.5px;
      color: var(--gold); text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px; border-radius: 4px;
      background: rgba(199,154,46,0.08); display: inline-block;
      border: 1px solid rgba(199,154,46,0.2);
      line-height: 1;
    }

    /* ── Stats Row ── */
    .sidebar-stats {
      display: flex; gap: 6px; padding: 12px 10px; margin: 8px 8px 0;
    }
    .sidebar-stat {
      flex: 1; text-align: center; padding: 8px 4px;
      border-radius: var(--radius-xs);
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(199,154,46,0.08);
      transition: all var(--transition);
    }
    .sidebar-stat:hover { border-color: rgba(199,154,46,0.20); background: rgba(199,154,46,0.04); }
    .sidebar-stat-value {
      font-size: 15px; font-weight: 800; color: var(--gold-light);
      font-family: 'Cinzel', serif; line-height: 1;
    }
    .sidebar-stat-label {
      font-size: 8px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.8px; margin-top: 3px; font-family: 'Inter', sans-serif;
    }

    /* ── Divider ── */
    .sidebar-divider {
      margin: 10px 16px; height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(199,154,46,0.3) 15%, rgba(199,154,46,0.3) 85%, transparent 100%);
    }

    /* ── Nav Sections ── */
    .sidebar-section { padding: 0 10px; margin-bottom: 6px; }
    .sidebar-section .section-label {
      font-size: 8px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--text-muted); padding: 0 12px; margin-bottom: 8px;
      font-weight: 700; font-family: 'JetBrains Mono', monospace;
      display: flex; align-items: center; gap: 6px;
    }
    .section-label::before {
      content: ''; width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); opacity: 0.4;
    }

    .sidebar-link {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      color: var(--text-dim); text-decoration: none;
      font-size: 12.5px; transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      font-weight: 500; margin-bottom: 1px;
      position: relative; overflow: hidden;
    }
    .sidebar-link::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(199,154,46,0), rgba(199,154,46,0.06));
      opacity: 0; transition: opacity 0.3s ease;
    }
    .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease;
      font-size: 17px; width: 22px; text-align: center; flex-shrink: 0;
      transition: all 0.3s ease; position: relative; z-index: 1;
    }
    .sidebar-link .label { position: relative; z-index: 1; }
    .sidebar-link .badge {
      margin-left: auto; padding: 2px 7px; border-radius: 5px;
      font-size: 8px; font-weight: 700; letter-spacing: 0.5px;
      font-family: 'JetBrains Mono', monospace; position: relative; z-index: 1;
      background: rgba(199,154,46,0.10); color: var(--gold-light);
    }

    .sidebar-link:hover { background: rgba(199,154,46,0.06); color: var(--gold-light); }
    .sidebar-link:hover::after { opacity: 1; }
    .sidebar-link:hover .icon { transform: scale(1.18);
      filter: drop-shadow(0 0 6px rgba(199,154,46,0.5)); }
    .sidebar-link:hover .badge { background: rgba(199,154,46,0.18); }

    /* Active — gold glow */
    .sidebar-link.active {
      background: linear-gradient(90deg, rgba(199,154,46,0.08) 0%, rgba(199,154,46,0.02) 100%);
      color: var(--gold-light);
      border-left: 2px solid var(--gold);
      padding-left: 10px;
      box-shadow: inset 0 0 20px rgba(199,154,46,0.04);
    }
    .sidebar-link.active .badge { background: rgba(199,154,46,0.20); color: var(--gold-light); }

    .sidebar-spacer { flex: 1; }

    /* ── Footer ── */
    .sidebar-footer {
      padding: 8px 16px; margin: 0 8px 10px;
      border-top: 1px solid rgba(199,154,46,0.06);
      display: flex; align-items: center; justify-content: center;
    }
    .sidebar-footer-version {
      font-size: 10px; color: var(--text-dim);
      font-family: 'Inter', sans-serif; opacity: 0.45;
      letter-spacing: 0.3px; font-weight: 400;
    }

    /* ═══ MAIN ═══ */
    .main-content {
      flex: 1; margin-left: var(--sidebar-w);
      padding: 28px 32px 60px;
      max-width: calc(100% - var(--sidebar-w));
      transition: margin-left 0.35s cubic-bezier(0.4,0,0.2,1), max-width 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .sidebar.collapsed ~ .main-content {
      margin-left: var(--sidebar-collapsed-w);
      max-width: calc(100% - var(--sidebar-collapsed-w));
    }

    /* ═══ NETFLIX HERO ═══ */
    .hero-featured {
      position: relative; height: 460px;
      background: linear-gradient(135deg, rgba(15,23,42,0.6) 0%, rgba(2,6,23,0.8) 100%);
      overflow: hidden; margin-bottom: 32px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .hero-featured::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(199,154,46,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 70% 20%, rgba(199,154,46,0.06) 0%, transparent 50%);
    }
    .hero-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 60%; background: linear-gradient(to top, var(--bg-deep) 0%, transparent 100%);
    }
    .hero-content {
      position: absolute; bottom: 56px; left: 48px; max-width: 560px; z-index: 2;
    }
    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--gold); margin-bottom: 12px;
      font-weight: 700; font-family: 'JetBrains Mono', monospace;
    }
    .hero-badge::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); box-shadow: 0 0 8px var(--gold-light);
      animation: pulse 2s infinite;
    }
    .hero-content h1 {
      font-size: 42px; font-weight: 900; margin-bottom: 12px;
      background: linear-gradient(135deg, var(--text) 0%, var(--text-dim) 60%, var(--gold-light) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: -1px; line-height: 1.1;
    }
    .hero-content .hero-desc {
      font-size: 14px; color: var(--text-dim); line-height: 1.6;
      margin-bottom: 20px;
    }
    .hero-buttons { display: flex; gap: 14px; }
    .hero-btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 30px; border-radius: 10px;
      background: linear-gradient(135deg, var(--gold), #0891b2);
      color: #fff; text-decoration: none; font-weight: 700;
      font-size: 13px; transition: all 0.3s ease;
      box-shadow: 0 0 25px rgba(199,154,46,0.3), 0 4px 12px rgba(0,0,0,0.3);
    }
    .hero-btn-primary:hover { box-shadow: 0 0 45px rgba(199,154,46,0.5), 0 8px 24px rgba(0,0,0,0.4); transform: translateY(-2px); }
    .hero-btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 30px; border-radius: 10px;
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-dim); text-decoration: none; font-weight: 600;
      font-size: 13px; transition: all 0.3s ease;
    }
    .hero-btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* ═══ NETFLIX ROWS ═══ */
    .category-row { padding: 0 36px; margin-bottom: 44px; }
    .row-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .row-title {
      font-size: 16px; font-weight: 700; color: var(--text);
      display: flex; align-items: center; gap: 10px;
    }
    .row-accent {
      width: 4px; height: 16px; border-radius: 2px; display: inline-block;
    }
    .row-accent.gold { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-accent.cyan { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-accent.emerald { background: var(--gold); box-shadow: 0 0 10px var(--gold-light); }
    .row-count { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
    .row-scroll {
      display: flex; gap: 16px; overflow-x: auto;
      padding: 4px 2px 16px;
      scroll-behavior: smooth;
      -ms-overflow-style: none; scrollbar-width: none;
    }
    .row-scroll::-webkit-scrollbar { display: none; }

    /* ═══ NETFLIX GRID (Catálogo Completo) ═══ */
    .course-grid-netflix {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 4px 2px 16px;
    }
    .course-grid-netflix .course-card {
      min-width: unset; max-width: unset; width: 100%;
    }
    .course-grid-netflix .course-card .card-thumb {
      aspect-ratio: 16/10;
    }
    .course-grid-netflix .course-card .card-thumb-img {
      transition: transform 0.5s ease;
    }
    .course-grid-netflix .course-card:hover .card-thumb-img {
      transform: scale(1.1);
    }

    /* ═══ COURSE CARD ═══ */
    .course-card {
      min-width: 290px; max-width: 290px;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(199,154,46,0.10);
      border-radius: var(--radius); overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      flex-shrink: 0; cursor: pointer; text-decoration: none; color: inherit;
      position: relative;
    }
    .course-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(199,154,46,0.05), transparent, rgba(199,154,46,0.05));
      opacity: 0; transition: opacity 0.4s; border-radius: var(--radius); z-index: 0;
    }
    .course-card:hover::before { opacity: 1; }
    .course-card:hover {
      transform: translateY(-8px);
      border-color: rgba(199,154,46,0.3);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(199,154,46,0.15), 0 0 40px rgba(199,154,46,0.08);
      z-index: 10;
    }
    .course-card .card-thumb {
      height: 170px; position: relative; overflow: hidden;
      background: linear-gradient(135deg, rgba(15,23,42,0.8) 0%, rgba(2,6,23,0.9) 100%);
    }
    .course-card .card-thumb-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s ease; }
    .course-card:hover .card-thumb-img { transform: scale(1.12); }
    .course-card .card-badge {
      position: absolute; top: 14px; right: 14px;
      font-size: 10px; font-weight: 800; padding: 5px 12px; border-radius: 6px;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.5px; z-index: 2;
    }
    .course-card .card-badge.new { background: rgba(199,154,46,0.12); color: var(--gold); border: 1px solid rgba(199,154,46,0.25); }
    .course-card .card-badge.in-progress { background: rgba(199,154,46,0.18); color: var(--gold); border: 1px solid rgba(199,154,46,0.35); }
    .course-card .card-badge.completed { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .course-card .card-play-btn {
      position: absolute; inset: 0; display: flex;
      align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.3s ease; z-index: 3;
    }
    .course-card .card-play-circle {
      width: 56px; height: 56px; border-radius: 14px;
      background: linear-gradient(135deg, var(--gold), #0891b2);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 30px rgba(199,154,46,0.3);
      transform: scale(0.7); transition: transform 0.3s ease;
    }
    .course-card:hover .card-play-btn { opacity: 1; }
    .course-card:hover .card-play-circle { transform: scale(1); }
    .course-card .card-info { padding: 14px 16px; position: relative; z-index: 1; }
    .course-card .card-info h4 { font-size: 14px; font-weight: 600; margin: 0; line-height: 1.3; }

    /* Empty */
    .empty-state {
      text-align: center; padding: 80px 20px; margin: 0 36px;
      background: var(--glass-bg); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--radius);
    }
    .empty-state .empty-glow {
      width: 80px; height: 80px; border-radius: 20px;
      background: linear-gradient(135deg, rgba(199,154,46,0.1), rgba(199,154,46,0.1));
      border: 1px solid rgba(199,154,46,0.15); display: flex;
      align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 20px;
    }
    .empty-state h3 {
      font-size: 22px; font-weight: 700; margin-bottom: 10px;
      background: linear-gradient(135deg, var(--text), var(--gold-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .empty-state p { color: var(--text-dim); font-size: 14px; margin-bottom: 24px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .anim-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    .anim-d1 { animation-delay: 0.04s; }
    .anim-d2 { animation-delay: 0.1s; }
    .anim-d3 { animation-delay: 0.16s; }
    .anim-d4 { animation-delay: 0.22s; }

    @media(max-width:768px) {
      .sidebar { width: 100%; min-width: 100%; position: relative; top: auto; bottom: auto; height: auto; border-right: none; border-bottom: 1px solid rgba(199,154,46,0.12); padding: 6px 0; flex-direction: row; overflow-x: auto; background: rgba(13,23,38,0.75); }
      .sidebar-brand { display: none; }
      .sidebar-user, .sidebar-stats, .sidebar-divider, .sidebar-footer { display: none; }
      .sidebar-section { padding: 0 3px; margin: 0; display: flex; }
      .sidebar-section .section-label { display: none; }
      .sidebar-link { white-space: nowrap; font-size: 10px; padding: 6px 8px; margin: 0 1px; border-radius: 6px; }
      .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease; font-size: 13px; width: auto; }
      .sidebar-link .badge { display: none; }
      .sidebar-link.active { border-left: none; padding-left: 8px; }
      .topbar-logo { display: inline-block; height: 28px; filter: brightness(1.05) drop-shadow(0 0 6px rgba(199,154,46,0.15)); }
      .sidebar-link::after { display: none; }
      .layout { flex-direction: column; }
      .main-content { margin-left: 0; max-width: 100%; padding: 16px 12px; }
      .sidebar-section { padding: 0 3px; margin: 0; display: flex; }
      .sidebar-section .section-label { display: none; }
      .sidebar-link { white-space: nowrap; font-size: 10px; padding: 6px 8px; margin: 0 1px; border-radius: 6px; }
      .sidebar-link .icon {
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), color 0.3s ease, filter 0.3s ease; font-size: 13px; width: auto; }
      .sidebar-link .badge { display: none; }
      .sidebar-link.active::before { display: none; }
      .layout { flex-direction: column; }
      .main-content { margin-left: 0; max-width: 100%; }
      .hero-featured { height: 320px; }
      .hero-content { left: 20px; bottom: 32px; max-width: calc(100% - 40px); }
      .hero-content h1 { font-size: 26px; }
      .category-row { padding: 0 16px; }
      .course-card { min-width: 220px; max-width: 220px; }
      .course-card .card-thumb { height: 130px; }
      .topbar-user-name { display: none; }
    }

    /* ═══ FINANCIAL DASHBOARD ═══ */
    .fin-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .fin-kpi {
      background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 20px;
      text-align: center; transition: all 0.3s ease;
    }
    .fin-kpi:hover { border-color: rgba(199,154,46,0.3); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .fin-kpi-icon { font-size: 28px; margin-bottom: 8px; }
    .fin-kpi-value { font-size: 28px; font-weight: 800; color: var(--gold); margin-bottom: 4px; }
    .fin-kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .fin-kpi-delta { margin-top: 6px; font-size: 11px; }
    .fin-delta-up { color: #22c55e; }
    .fin-delta-down { color: #ef4444; }

    .fin-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    .fin-chart-card, .fin-table-card {
      background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border); border-radius: var(--radius); overflow: hidden;
    }
    .fin-chart-header { padding: 16px 20px; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
    .fin-chart-header h3 { font-size: 14px; font-weight: 600; margin: 0; }
    .fin-chart-sub { font-size: 11px; color: var(--text-muted); }
    .fin-chart-body { padding: 20px; }
    .fin-chart-placeholder, .fin-chart-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }

    .fin-bars { display: flex; align-items: flex-end; gap: 8px; height: 180px; padding: 0 4px; }
    .fin-bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; min-width: 0; }
    .fin-bar-val { font-size: 9px; color: var(--text-muted); margin-bottom: 4px; font-family: 'JetBrains Mono', monospace; white-space: nowrap; }
    .fin-bar { width: 100%; max-width: 32px; background: linear-gradient(180deg, var(--gold), rgba(199,154,46,0.3)); border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
    .fin-bar-label { font-size: 9px; color: var(--text-muted); margin-top: 6px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }

    .fin-table-wrap { overflow-x: auto; }
    .fin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .fin-table th { text-align: left; padding: 12px 20px; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--glass-border); }
    .fin-table td { padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); color: #e2e8f0; }
    .fin-table tr:hover td { background: rgba(199,154,46,0.04); }
    .fin-status-ok { color: #22c55e; font-size: 11px; font-weight: 600; }
    .fin-status-pend { color: #f59e0b; font-size: 11px; font-weight: 600; }
    .fin-status-err { color: #ef4444; font-size: 11px; font-weight: 600; }

    .fin-table-card { margin-bottom: 24px; }

    @media (max-width: 768px) {
      .fin-grid { grid-template-columns: repeat(2, 1fr); }
      .fin-charts { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .fin-grid { grid-template-columns: 1fr; }
    }

  </style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>

<!-- ═══ TOPBAR ═══ -->
<nav class="topbar">
  <div class="topbar-left"><button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="Recolher sidebar"><span class="ico">◀</span></button></div>
  <div class="topbar-right">
    <span class="topbar-user-name" id="userName">// carregando...</span>
    <div class="topbar-avatar" id="userAvatar">?</div>
    <button class="topbar-btn" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<!-- ═══ LAYOUT ═══ -->
<div class="layout">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <!-- Brand -->
    <div class="sidebar-brand">
      <img src="../img/logo-lumethos-correto.png" alt="Lumethos" class="sidebar-brand-logo">
    </div>
    <div class="sidebar-user">
      <div class="sidebar-user-top">
        <div class="sidebar-user-avatar" id="sbAvatar">?</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="sbName">Aluno</div>
          <span class="sidebar-user-role" id="sbRole">ALUNO</span>
        </div>
      </div>
    </div>
    <div class="sidebar-stats">
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCourses">0</div>
        <div class="sidebar-stat-label">Cursos</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCompleted">0</div>
        <div class="sidebar-stat-label">Aulas</div>
      </div>
      <div class="sidebar-stat">
        <div class="sidebar-stat-value" id="sbCerts">0</div>
        <div class="sidebar-stat-label">Certif.</div>
      </div>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="section-label">Principal</div>
      <a href="/aluno/dashboard.html" class="sidebar-link">
        <span class="icon">◆</span><span class="label">Dashboard</span>
      </a>
      <a href="/aluno/biblioteca.html" class="sidebar-link active">
        <span class="icon">▤</span><span class="label">Cursos</span>
      </a>
      <a href="/aluno/certificados.html" class="sidebar-link">
        <span class="icon">✦</span><span class="label">Certificados</span>
      </a>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Ferramentas</div>
      <a href="#" onclick="ssoRedirect('scriba');return false;" class="sidebar-link">
        <span class="icon">◈</span><span class="label">Scriba</span>
        <span class="badge">BETA</span>
      </a>
      <a href="#" onclick="ssoRedirect('centelhaz');return false;" class="sidebar-link">
        <span class="icon">⚡</span><span class="label">Centelhaz</span>
      </a>
      <a href="#" class="sidebar-link" onclick="showToast('📖 Bíblia de Estudo em breve!');return false;">
        <span class="icon">📖</span><span class="label">Bíblia de Estudo</span>
        <span class="badge">EM BREVE</span>
      </a>
    </div>

    <div class="sidebar-section admin-only" style="display:none;">
      <div class="section-label">Admin</div>
      <a href="/aluno/financeiro.html" class="sidebar-link active">
        <span class="icon">💰</span><span class="label">Financeiro</span>
      </a>
    </div>

    <div class="sidebar-spacer"></div>
    <div class="sidebar-section">
      <div class="section-label">Conta</div>
      <a href="/aluno/perfil.html" class="sidebar-link">
        <span class="icon">○</span><span class="label">Meu Perfil</span>
      </a>
      <a href="#" onclick="logout()" class="sidebar-link">
        <span class="icon">↩</span><span class="label">Sair</span>
      </a>
    </div>
    <div class="sidebar-footer">
      <span class="sidebar-footer-version">Instituto Lumethos</span>
    </div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main-content" id="mainContent">
    <div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
      <div style="text-align:center;color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:12px;">LOADING...</div>
    </div>
  </main>
</div>

<script>
  const API = '/api';
  function getToken(){ return localStorage.getItem('lumethos_token'); }
  function h(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }
  let userData = null;

  async function init() {
    const res = await fetch(API+'/auth/me', { headers: h() });
    if (!res.ok) { window.location.href = '/login.html'; return; }
    const data = await res.json();
    userData = data.user || data;

    const displayName = userData.user_metadata?.name || userData.name || userData.email?.split('@')[0] || 'Aluno';
    document.getElementById('userName').textContent = displayName;
    document.getElementById('sbName').textContent = displayName;
    document.getElementById('sbAvatar').textContent = displayName.charAt(0).toUpperCase();

    const role = userData.role || 'aluno';
    const roleLabel = role === 'admin' ? 'ADMIN' : role === 'tutor' ? 'TUTOR' : 'ALUNO';
    document.getElementById('sbRole').textContent = roleLabel;
    document.getElementById('sbRole').className = 'sidebar-user-role role-' + role;

    if (role === 'admin' || role === 'superadmin') {
      document.querySelectorAll('.admin-only').forEach(el => el.style.display = '');
    }

    // Sidebar stats
    try {
      const [cr, pr, cer] = await Promise.all([
        fetch(API + '/courses', { headers: h() }),
        fetch(API + '/courses/progress', { headers: h() }),
        fetch(API + '/certificates', { headers: h() })
      ]);
      const courses = cr.ok ? await cr.json() : [];
      const progress = pr.ok ? await pr.json() : [];
      const certs = cer.ok ? await cer.json() : [];
      document.getElementById('sbCourses').textContent = courses.length || 0;
      const pm = {};
      for (const p of progress) { if (!pm[p.course_id]) pm[p.course_id] = 0; if (p.completed) pm[p.course_id]++; }
      let completedLessons = 0;
      for (const c of courses) { completedLessons += pm[c.id] || 0; }
      document.getElementById('sbCompleted').textContent = completedLessons;
      document.getElementById('sbCerts').textContent = certs.length || 0;
    } catch(e) {}

    if (role !== 'admin' && role !== 'superadmin') {
      document.getElementById('finContent').innerHTML = '<div class="card anim-in anim-d2" style="text-align:center;padding:60px 20px;">' +
        '<div style="font-size:48px;margin-bottom:16px;">🔒</div>' +
        '<h3 style="color:var(--gold);margin-bottom:8px;">Acesso Restrito</h3>' +
        '<p style="color:var(--text-muted);">Apenas administradores têm acesso ao painel financeiro.</p></div>';
      return;
    }
    renderFinanceiro();
  }

  async function renderFinanceiro() {
    const container = document.getElementById('finContent');
    container.innerHTML = `
      <div class="fin-grid anim-in anim-d2">
        <div class="fin-kpi">
          <div class="fin-kpi-icon">👥</div>
          <div class="fin-kpi-value" id="kpiAlunos">—</div>
          <div class="fin-kpi-label">Alunos Ativos</div>
          <div class="fin-kpi-delta" id="kpiAlunosDelta"></div>
        </div>
        <div class="fin-kpi">
          <div class="fin-kpi-icon">📚</div>
          <div class="fin-kpi-value" id="kpiCursos">—</div>
          <div class="fin-kpi-label">Cursos Ativos</div>
        </div>
        <div class="fin-kpi">
          <div class="fin-kpi-icon">💵</div>
          <div class="fin-kpi-value" id="kpiReceita">—</div>
          <div class="fin-kpi-label">Receita Total</div>
          <div class="fin-kpi-delta" id="kpiReceitaDelta"></div>
        </div>
        <div class="fin-kpi">
          <div class="fin-kpi-icon">🎯</div>
          <div class="fin-kpi-value" id="kpiConversao">—</div>
          <div class="fin-kpi-label">Taxa de Conversão</div>
        </div>
      </div>

      <div class="fin-charts anim-in anim-d3">
        <div class="fin-chart-card">
          <div class="fin-chart-header">
            <h3>📊 Receita Mensal</h3>
            <span class="fin-chart-sub">Últimos 12 meses</span>
          </div>
          <div class="fin-chart-body" id="chartReceita">
            <div class="fin-chart-placeholder">Carregando...</div>
          </div>
        </div>
        <div class="fin-chart-card">
          <div class="fin-chart-header">
            <h3>📈 Matrículas por Curso</h3>
            <span class="fin-chart-sub">Distribuição atual</span>
          </div>
          <div class="fin-chart-body" id="chartCursos">
            <div class="fin-chart-placeholder">Carregando...</div>
          </div>
        </div>
      </div>

      <div class="fin-table-card anim-in anim-d4">
        <div class="fin-chart-header">
          <h3>🔄 Últimas Transações</h3>
        </div>
        <div class="fin-table-wrap">
          <table class="fin-table" id="tblTransacoes">
            <thead><tr><th>Aluno</th><th>Curso</th><th>Valor</th><th>Status</th><th>Data</th></tr></thead>
            <tbody><tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
    `;

    try {
      const res = await fetch(API + '/admin/stats', { headers: h() });
      if (res.ok) {
        const stats = await res.json();
        updateKPIs(stats);
        if (stats.receita_mensal?.length) renderBarChart('chartReceita', stats.receita_mensal);
        else document.getElementById('chartReceita').innerHTML = '<div class="fin-chart-empty">Sem dados</div>';
        if (stats.cursos_matriculas?.length) renderBarChart('chartCursos', stats.cursos_matriculas);
        else document.getElementById('chartCursos').innerHTML = '<div class="fin-chart-empty">Sem dados</div>';
        if (stats.transacoes?.length) renderTransacoes(stats.transacoes);
        else document.getElementById('tblTransacoes').querySelector('tbody').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text-muted)">Nenhuma transação</td></tr>';
      }
    } catch(e) {
      document.getElementById('finContent').innerHTML += '<div style="text-align:center;padding:20px;color:var(--text-muted)">Erro ao carregar dados do servidor.</div>';
    }
  }

  function updateKPIs(stats) {
    document.getElementById('kpiAlunos').textContent = stats.alunos_ativos || 0;
    document.getElementById('kpiCursos').textContent = stats.cursos_ativos || 0;
    const receita = stats.receita_total || 0;
    document.getElementById('kpiReceita').textContent = 'R$ ' + (receita / 100).toLocaleString('pt-BR', {minimumFractionDigits:2});
    document.getElementById('kpiConversao').textContent = (stats.taxa_conversao || 0).toFixed(1) + '%';
    if (stats.alunos_delta != null) {
      const d = stats.alunos_delta, cls = d >= 0 ? 'fin-delta-up' : 'fin-delta-down';
      document.getElementById('kpiAlunosDelta').innerHTML = '<span class="'+cls+'">'+(d>=0?'+':'')+d+'% este mês</span>';
    }
    if (stats.receita_delta != null) {
      const d = stats.receita_delta, cls = d >= 0 ? 'fin-delta-up' : 'fin-delta-down';
      document.getElementById('kpiReceitaDelta').innerHTML = '<span class="'+cls+'">'+(d>=0?'+':'')+d+'% vs mês anterior</span>';
    }
  }

  function renderBarChart(containerId, data) {
    const maxVal = Math.max(...data.map(d => d.valor || d.total || d.count || 0), 1);
    const maxBarPx = 140;
    let html = '<div class="fin-bars">';
    for (const d of data) {
      const val = d.valor || d.total || d.count || 0;
      const height = Math.max((val / maxVal) * maxBarPx, 4);
      const label = d.mes || d.curso || d.label || '—';
      const displayVal = d.valor || d.total ? 'R$ ' + (val/100).toLocaleString('pt-BR',{minimumFractionDigits:0}) : val;
      html += '<div class="fin-bar-col">' +
        '<div class="fin-bar-val">'+displayVal+'</div>' +
        '<div class="fin-bar" style="height:'+height+'px"></div>' +
        '<div class="fin-bar-label">'+label.substring(0,12)+'</div>' +
      '</div>';
    }
    html += '</div>';
    document.getElementById(containerId).innerHTML = html;
  }

  function renderTransacoes(transacoes) {
    const tbody = document.getElementById('tblTransacoes').querySelector('tbody');
    tbody.innerHTML = transacoes.slice(0, 20).map(t => {
      const sc = t.status === 'approved' ? 'fin-status-ok' : t.status === 'pending' ? 'fin-status-pend' : 'fin-status-err';
      const sl = t.status === 'approved' ? 'Aprovado' : t.status === 'pending' ? 'Pendente' : t.status || '—';
      const v = t.amount_cents ? 'R$ '+(t.amount_cents/100).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';
      const dt = t.created_at ? new Date(t.created_at).toLocaleDateString('pt-BR') : '—';
      return '<tr><td>'+(t.user_name||t.user_email||'—')+'</td><td>'+(t.course_title||'—')+'</td><td>'+v+'</td><td><span class="'+sc+'">'+sl+'</span></td><td>'+dt+'</td></tr>';
    }).join('');
  }

  function escAttr(s) { if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showToast(msg, isErr) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.className = 'toast ' + (isErr?'error ':'') + 'show';
    setTimeout(() => t.classList.remove('show'), 3000);
  }
  function logout() { localStorage.clear(); window.location.href = '/login.html'; }
  async function ssoRedirect(target) {
    const token = localStorage.getItem('lumethos_token');
    if (!token) return;
    try {
      const r = await fetch('/api/auth/sso/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ target })
      });
      if (!r.ok) { alert('Erro ao acessar ' + target); return; }
      const data = await r.json();
      window.open(data.redirect_url, '_blank');
    } catch(e) { alert('Erro de conexão ao acessar ' + target); }
  }
  init();
</script>
</body>
