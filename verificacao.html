<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificação de Credencial — Instituto Lumethos</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card-verify {
      display: flex;
      max-width: 820px;
      width: 100%;
      min-height: 500px;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    /* Lado esquerdo — Azul escuro */
    .card-verify .left {
      flex: 1;
      background: #0D1B2A;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .card-verify .left .badge {
      display: inline-block;
      background: rgba(199,154,46,0.12);
      color: #C79A2E;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 14px;
      border-radius: 20px;
      margin-bottom: 28px;
    }
    .card-verify .left .logo-wrap {
      margin-bottom: 24px;
    }
    .card-verify .left .logo-wrap img {
      height: 100px;
      display: block;
    }
    .card-verify .left .title {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }
    .card-verify .left .sub {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      line-height: 1.6;
      max-width: 280px;
    }
    .card-verify .left .seal-mini {
      margin-top: 32px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 1.5px solid rgba(199,154,46,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-verify .left .seal-mini svg {
      width: 26px;
      height: 26px;
      fill: #C79A2E;
      opacity: 0.5;
    }

    /* Lado direito — Branco com formulário */
    .card-verify .right {
      flex: 1;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-verify .right h2 {
      font-size: 22px;
      font-weight: 700;
      color: #0D1B2A;
      margin-bottom: 4px;
    }
    .card-verify .right .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    .card-verify .right .form-group {
      margin-bottom: 18px;
    }
    .card-verify .right .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      margin-bottom: 6px;
    }
    .card-verify .right .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .card-verify .right .form-group input:focus {
      border-color: #C79A2E;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(199,154,46,0.08);
    }
    .card-verify .right .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
    }
    .card-verify .right .btn-row button {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .card-verify .right .btn-verify {
      width: 100%;
      padding: 13px;
      background: #C79A2E;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .card-verify .right .btn-verify:hover { background: #b8891f; }
    .card-verify .right .btn-verify:disabled { opacity: 0.6; cursor: not-allowed; }
    .card-verify .right .btn-verify.highlight {
      box-shadow: 0 0 0 3px rgba(199,154,46,0.3);
      animation: pulse-gold 1.5s ease-in-out infinite;
    }
    .card-verify .right .btn-verify svg { width: 16px; height: 16px; fill: currentColor; }
    .card-verify .right .btn-qr {
      padding: 10px;
      background: #fff;
      color: #0D1B2A;
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      margin-bottom: 10px;
    }
    .card-verify .right .btn-qr:hover { border-color: #C79A2E; background: rgba(199,154,46,0.04); }
    .card-verify .right .btn-qr.scanning { border-color: #C79A2E; background: rgba(199,154,46,0.08); color: #C79A2E; }
    .card-verify .right .btn-qr svg { width: 16px; height: 16px; fill: currentColor; }
    .qr-scanner {
      display: none;
      margin-bottom: 14px;
      border-radius: 10px;
      overflow: hidden;
      background: #0D1B2A;
      position: relative;
    }
    .qr-scanner.show { display: block; }
    .qr-scanner #reader { width: 100%; min-height: 180px; }
    .qr-scanner .close-scanner {
      position: absolute;
      top: 6px; right: 6px;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-box {
      display: none;
      margin-top: 18px;
      padding: 16px 18px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.6;
    }
    .result-box.show { display: block; }
    .result-box.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .result-box.error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
    .result-box .result-name { font-size: 15px; font-weight: 700; color: #0D1B2A; margin-bottom: 2px; }
    .result-box .result-course { font-size: 12px; color: #555; margin-bottom: 6px; }
    .result-box .result-meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 11px; color: #888; }
    .result-box .result-meta span { display: flex; align-items: center; gap: 4px; }
    .result-box .result-badge {
      display: inline-block; margin-top: 10px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .result-box .result-badge.valid { background: rgba(22,101,52,0.1); color: #166534; }
    .result-box .result-badge svg { width: 12px; height: 12px; fill: currentColor; vertical-align: middle; margin-right: 4px; }
    .card-verify .right .footer-link {
      margin-top: 20px;
      text-align: center;
    }
    .card-verify .right .footer-link a {
      font-size: 12px;
      color: #888;
      text-decoration: none;
    }
    .card-verify .right .footer-link a:hover { color: #C79A2E; }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse-gold {
      0%, 100% { box-shadow: 0 0 0 3px rgba(199,154,46,0.3); }
      50% { box-shadow: 0 0 0 6px rgba(199,154,46,0.15); }
    }
    @media (max-width: 640px) {
      .card-verify { flex-direction: column; min-height: auto; }
      .card-verify .left { padding: 36px 28px; }
      .card-verify .left .logo-wrap img { height: 72px; }
      .card-verify .left .seal-mini { display: none; }
      .card-verify .right { padding: 32px 24px; }
    }
  </style>
<style>.nav-top{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(13,27,42,0.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;padding:8px 20px;gap:12px;border-bottom:1px solid rgba(199,154,46,0.1)}.nav-top a{display:inline-flex;align-items:center;gap:5px;text-decoration:none;font-size:12px;font-weight:500;color:rgba(255,255,255,0.7);padding:5px 12px;border-radius:8px;transition:all 0.15s}.nav-top a:hover{background:rgba(255,255,255,0.1);color:#C79A2E}.nav-top a svg{width:16px;height:16px;fill:currentColor}.nav-top .spacer{flex:1}.nav-top .logo-mini{height:20px;opacity:0.35}body{padding-top:44px}</style>
</head>
<body>
  <div class="nav-top"><a href="javascript:history.back()" title="Voltar"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Voltar</a><a href="/" title="Página Inicial"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> Início</a><span class="spacer"></span><img class="logo-mini" src="img/logo-lumethos-correto.png" alt="Lumethos"></div>
  <div class="card-verify">
    <!-- Lado esquerdo — Azul escuro com identidade -->
    <div class="left">
      <div class="badge">SAPIENTIA AD MINISTERIUM</div>
      <div class="logo-wrap">
        <img src="img/logo-lumethos-correto.png" alt="Instituto Lumethos">
      </div>
      <div class="title">Credencial do Capelão</div>
      <div class="sub">Verifique a autenticidade de uma credencial de capelão emitida pelo Instituto Lumethos</div>
      <div class="seal-mini">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </div>
    </div>

    <!-- Lado direito — Formulário -->
    <div class="right">
      <h2>Verificar Credencial</h2>
      <p class="subtitle">Informe o código da credencial ou o CPF do capelão</p>

      <div class="form-group">
        <label for="codigo">Código ou CPF</label>
        <input type="text" id="codigo" placeholder="Ex: MIRC-2026-0000 ou 000.000.000-00" autocomplete="off">
      </div>

      <button id="btnQr" class="btn-qr" onclick="toggleScanner()">
        <svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3z"/></svg>
        Ler QR Code
      </button>

      <div id="qrScanner" class="qr-scanner">
        <button class="close-scanner" onclick="stopScanner()">✕</button>
        <div id="reader"></div>
      </div>

      <button id="btnVerify" class="btn-verify" onclick="verificar()">
        <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        Verificar
      </button>

      <div id="result" class="result-box"></div>

      <div class="footer-link">
        <a href="/">← Voltar para o Instituto Lumethos</a>
      </div>
    </div>
  </div>

  <script>
    async function verificar() {
      const input = document.getElementById('codigo');
      const btn = document.getElementById('btnVerify');
      const result = document.getElementById('result');
      const codigo = input.value.trim();

      result.classList.remove('show', 'success', 'error');
      btn.classList.remove('highlight');

      if (!codigo) {
        result.className = 'result-box show error';
        result.innerHTML = 'Digite o código da credencial ou CPF para verificar.';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verificando...';

      try {
        const res = await fetch('/api/verificacao', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codigo })
        });
        const data = await res.json();

        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Verificar';

        if (!res.ok || !data.valido) {
          result.className = 'result-box show error';
          result.innerHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#dc2626"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><strong>Credencial não encontrada</strong></div><p style="color:#888;font-size:12px;">Nenhuma credencial encontrada com o código ou CPF informado.</p>';
          return;
        }

        const d = data;
        result.className = 'result-box show success';
        result.innerHTML = '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="#166534"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg><div><div class="result-name">' + d.nome + '</div><div class="result-course">' + d.curso + '</div></div></div><div class="result-meta"><span><svg width="14" height="14" viewBox="0 0 24 24" fill="#888"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg> ' + (d.data_conclusao || '—') + '</span><span><svg width="14" height="14" viewBox="0 0 24 24" fill="#888"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg> ' + d.codigo + '</span><span><svg width="14" height="14" viewBox="0 0 24 24" fill="#888"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg> ' + (d.carga_horaria || '150h') + '</span></div><div class="result-badge valid"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Credencial Válida</div>';
      } catch (e) {
        btn.disabled = false;
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Verificar';
        result.className = 'result-box show error';
        result.innerHTML = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="#dc2626"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg><strong>Erro de conexão</strong></div><p style="color:#888;font-size:12px;">Não foi possível verificar. Tente novamente.</p>';
      }
    }

    let html5QrCode = null;
    let scanning = false;

    function toggleScanner() {
      const scanner = document.getElementById('qrScanner');
      const btn = document.getElementById('btnQr');
      if (scanning) { stopScanner(); return; }

      scanner.classList.add('show');
      btn.classList.add('scanning');
      btn.innerHTML = '<span class="spinner" style="border-color:rgba(199,154,46,0.3);border-top-color:#C79A2E;"></span> Escaneando...';
      scanning = true;

      html5QrCode = new Html5Qrcode('reader');
      html5QrCode.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(function() {
        scanner.classList.remove('show');
        btn.classList.remove('scanning');
        btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3z"/></svg> Ler QR Code';
        scanning = false;
        document.getElementById('result').className = 'result-box show error';
        document.getElementById('result').innerHTML = '<strong>Erro na câmera</strong><p style="color:#888;font-size:12px;margin-top:4px;">Verifique as permissões.</p>';
      });
    }

    function stopScanner() {
      if (html5QrCode) {
        try { html5QrCode.stop().then(() => html5QrCode.clear()); } catch(e) {}
        html5QrCode = null;
      }
      document.getElementById('qrScanner').classList.remove('show');
      const btn = document.getElementById('btnQr');
      btn.classList.remove('scanning');
      btn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M3 11h8V3H3v8zm2-6h4v4H5V5zm8-2v8h8V3h-8zm6 6h-4V5h4v4zM3 21h8v-8H3v8zm2-6h4v4H5v-4zm13-2h-2v3h-3v2h3v3h2v-3h3v-2h-3v-3z"/></svg> Ler QR Code';
      scanning = false;
    }

    function onScanSuccess(decodedText, decodedResult) {
      stopScanner();
      document.getElementById('codigo').value = decodedText.trim();
      const btnVerify = document.getElementById('btnVerify');
      btnVerify.disabled = false;
      btnVerify.innerHTML = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg> Verificar';
      btnVerify.classList.add('highlight');
    }

    document.getElementById('codigo').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') verificar();
    });
  </script>
</body>
</html>
